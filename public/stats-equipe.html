<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Équipe — GEH Statcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fond: #f5f0e8;
            --fond-carte: #ede8dc;
            --fond-champ: #e0d9cc;
            --accent: #2c3e50;
            --vert: #27ae60;
            --rouge: #c0392b;
            --blanc: #ffffff;
            --texte: #2c2c2c;
            --gris: #888888;
            --rayon: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--fond); color: var(--texte); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
        header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        header img { mix-blend-mode: multiply; }
        header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2em; letter-spacing: 2px; color: var(--accent); }
        header h1 span { color: #888; }
        nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
        nav a { padding: 6px 14px; border-radius: 20px; background: var(--fond-carte); color: var(--texte); text-decoration: none; font-size: 0.9em; font-weight: 600; }
        nav a:hover { background: var(--fond-champ); }
        nav a.actif { background: var(--accent); color: white; }

        .dropdown { position: relative; }
        .dropdown-btn { font-size: 0.95em; padding: 8px 20px; border-radius: 20px; color: var(--gris); background: var(--fond-carte); border: 1px solid var(--fond-champ); cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .dropdown-btn:hover { background: var(--fond-champ); color: var(--texte); }
        .dropdown-menu { display: none; position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--fond-carte); border: 1px solid var(--fond-champ); border-radius: 12px; padding: 6px; min-width: 200px; z-index: 100; flex-direction: column; gap: 4px; }
        .dropdown-menu.ouvert { display: flex; }
        .dropdown-menu a { font-size: 0.9em; padding: 8px 14px; border-radius: 8px; text-decoration: none; color: var(--gris); background: transparent; border: none; transition: all 0.2s; white-space: nowrap; }
        .dropdown-menu a:hover { background: var(--fond-champ); color: var(--texte); }
        tbody tr.ligne-partie { border-bottom: 1px solid var(--fond-champ); transition: background 0.15s; }
        tbody tr.ligne-partie:hover { background: var(--fond); }
        h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8em; letter-spacing: 1px; color: var(--accent); margin-bottom: 16px; text-align: center; }
        h3 { font-size: 1em; font-weight: 600; color: var(--accent); margin-bottom: 12px; border-bottom: 2px solid var(--fond-champ); padding-bottom: 6px; }
        .lien-bouton { display: inline-block; font-size: 0.78em; padding: 3px 10px; border-radius: 12px; text-decoration: none; font-weight: 600; transition: background 0.2s; }
        .lien-teams { background: #4b6cb7; color: white; }
        .lien-teams:hover { background: #3a5498; }
        .lien-rejoindre { background: var(--vert); color: white; }
        .lien-rejoindre:hover { background: #219a52; }
        .section { width: 100%; max-width: 860px; background: var(--fond-carte); border-radius: var(--rayon); padding: 20px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
        thead th { background: var(--fond-champ); color: var(--texte); padding: 8px 12px; font-weight: 600; text-align: center; }
        thead th.gauche { text-align: left; }
        tbody tr { border-bottom: 1px solid var(--fond-champ); }
        tbody tr:last-child { border-bottom: none; }
        tbody td { padding: 8px 12px; text-align: center; }
        tbody td.gauche { text-align: left; }
        .pts { font-weight: 700; color: var(--accent); }
        .gris { color: var(--gris); }
        .rang { color: var(--gris); font-size: 0.85em; width: 32px; }
        .résultat-V { color: var(--vert); font-weight: 700; }
        .résultat-D { color: var(--rouge); font-weight: 700; }
        .résultat-N { color: var(--gris); font-weight: 600; }
        .score { font-weight: 700; }
        .score-gagnant { color: var(--vert); }
        .score-perdant { color: var(--rouge); }
        td.date { color: var(--gris); font-size: 0.88em; white-space: nowrap; }
        td.équipe { font-weight: 600; color: var(--texte); }
        td.score { font-family: 'Bebas Neue', sans-serif; font-size: 1.4em; letter-spacing: 1px; text-align: center; white-space: nowrap; width: 110px; }
        td.liens { text-align: center; white-space: nowrap; }
        .score-avenir { color: var(--gris); font-size: 0.55em; font-family: 'Inter', sans-serif; }
        .btn-expand { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 1.1em; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; line-height: 1; }
        .btn-expand:hover { background: var(--accent); color: white; }
        .btn-expand.ouvert { background: var(--accent); color: white; }
        .ligne-expand { display: none; background: var(--fond); }
        .ligne-expand.visible { display: table-row; }
        .zone-joueurs { padding: 12px 16px 16px 52px; background: var(--fond); border-top: 1px solid var(--fond-champ); }
        .grille-joueurs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 40px; }
        .colonne-équipe h4 { font-size: 0.85em; color: var(--accent); font-weight: 600; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--fond-champ); }
        .joueur-ligne { display: flex; justify-content: space-between; font-size: 0.88em; padding: 3px 0; color: var(--texte); }
        .joueur-ligne .pts { font-weight: 600; color: var(--accent); margin-left: 8px; }
        .joueur-ligne .pts-zero { color: var(--gris); font-weight: normal; }
        .lien-match { background: var(--fond-champ); color: var(--texte); border: 1px solid #ccc; }
        .lien-match:hover { background: var(--accent); color: white; border-color: var(--accent); }
        #msg { text-align: center; color: var(--gris); padding: 40px; }
    </style>
</head>
<body>
    <header>
        <img src="ampouleQuiz.png" alt="Logo GEH" style="width:52px; height:52px;">
        <h1>GEH <span>Statcan</span></h1>
    </header>
    <nav>
        <a href="stats-eliminations.html" id="lien-eliminations" style="display:none">🌳 Éliminatoires</a>
        <a href="stats-calendrier.html">📅 Calendrier</a>
        <a href="stats-classement.html">🏆 Classement</a>
        <a href="stats-compteurs.html">📊 Compteurs</a>
        <div class="dropdown">
            <button class="dropdown-btn" onclick="toggleRessources(this)">📚 Ressources ▾</button>
            <div class="dropdown-menu" id="menu-ressources">
                <a href="docs.html">📄 Documentation</a>
                <a href="https://gehstatcan.github.io/Saison24/SaisonReg/p5saisonPr%C3%A9c%C3%A9dentes.html" target="_blank">🕐 Saisons précédentes</a>
            </div>
        </div>
    </nav>

    <div id="sel-saison-wrap" style="text-align:center;margin-bottom:16px">
      <select id="sel-saison" onchange="changerSaisonStats()" style="background:var(--fond-carte);border:1px solid var(--fond-champ);color:var(--texte);padding:6px 12px;border-radius:8px;font-size:0.95em"></select>
    </div>

    <h2 id="titreÉquipe">Chargement...</h2>

    <div id="résumé-classement" style="display:none; background:var(--fond-carte); border-radius:12px; padding:14px 18px; margin-bottom:16px; align-items:center; gap:20px; flex-wrap:wrap; font-size:0.9em;">
        <span id="cl-position" style="font-size:1.3em; font-weight:700; color:var(--accent); min-width:40px;"></span>
        <span style="color:var(--gris); font-size:0.85em;">|</span>
        <span><strong id="cl-mj"></strong> <span style="color:var(--gris);">MJ</span></span>
        <span><strong id="cl-g"></strong> <span style="color:var(--gris);">G</span></span>
        <span><strong id="cl-gp"></strong> <span style="color:var(--gris);">GP</span></span>
        <span><strong id="cl-pn"></strong> <span style="color:var(--gris);">PN</span></span>
        <span><strong id="cl-pp"></strong> <span style="color:var(--gris);">PP</span></span>
        <span><strong id="cl-p"></strong> <span style="color:var(--gris);">P</span></span>
        <span style="color:var(--gris); font-size:0.85em;">|</span>
        <span><strong id="cl-pts"></strong> <span style="color:var(--gris);">pts</span></span>
        <span style="color:var(--gris);"><strong id="cl-pct"></strong></span>
        <a href="stats-classement.html" id="cl-lien" style="margin-left:auto; color:var(--accent); font-size:0.85em; text-decoration:none;">Voir classement →</a>
    </div>

    <div class="section">
        <h3>Parties</h3>
        <table>
            <thead>
                <tr>
                    <th style="width:32px;"></th>
                    <th style="width:36px; color:var(--gris);">#</th>
                    <th class="gauche">Date</th>
                    <th class="équipe" style="text-align:right;">Équipe A</th>
                    <th class="score">Score</th>
                    <th class="équipe" style="text-align:left;">Équipe B</th>
                    <th class="liens"></th>
                </tr>
            </thead>
            <tbody id="tbodyParties">
                <tr><td colspan="7" id="msg" style="text-align:center;color:var(--gris);padding:30px;">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h3>Joueurs</h3>
        <table>
            <thead>
                <tr>
                    <th class="rang">Pos</th>
                    <th class="gauche">Joueur</th>
                    <th>PJ</th>
                    <th>Pts</th>
                    <th>Pts/PJ</th>
                </tr>
            </thead>
            <tbody id="tbodyJoueurs">
                <tr><td colspan="5" id="msgJoueurs">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const noÉquipe = parseInt(params.get('noEquipe'));
        let saisonStats = params.get("saison") || null;
        let donnéesParties = [];

        async function chargerSélécteurSaison() {
          const [saisonsRes, activeRes] = await Promise.all([
            fetch("/api/saisons"), fetch("/api/saison-active")
          ]);
          const saisons = await saisonsRes.json();
          const { saison: active } = await activeRes.json();
          if (!saisonStats) saisonStats = active;
          const sel = document.getElementById("sel-saison");
          sel.innerHTML = saisons.map(s =>
            `<option value="${s}" ${s === saisonStats ? "selected" : ""}>${s}</option>`
          ).join("");
        }

        function changerSaisonStats() {
          saisonStats = document.getElementById("sel-saison").value;
          charger();
        }

        async function charger() {
            if (!noÉquipe) {
                document.getElementById('titreÉquipe').textContent = 'Équipe introuvable';
                return;
            }

            const [data, classement] = await Promise.all([
                fetch(`/api/stats/equipe/${noÉquipe}?saison=${saisonStats}`).then(r => r.json()),
                fetch(`/api/stats/classement?saison=${saisonStats}`).then(r => r.json()),
            ]);
            if (data.erreur) {
                document.getElementById('titreÉquipe').textContent = data.erreur;
                return;
            }

            document.title = `${data.équipe.nomÉquipe} — GEH Statcan`;
            document.getElementById('titreÉquipe').textContent = data.équipe.nomÉquipe;

            // Résumé classement
            const c = classement.find(e => e.noÉquipe === noÉquipe);
            if (c) {
                let rang = 1;
                const rangs = classement.map((e, i) => {
                    if (i > 0 && e.pct !== classement[i - 1].pct) rang = i + 1;
                    return rang;
                });
                const pos = rangs[classement.indexOf(c)];
                document.getElementById('cl-position').textContent = `${pos}e`;
                document.getElementById('cl-mj').textContent = c.MJ;
                document.getElementById('cl-g').textContent = c.G;
                document.getElementById('cl-gp').textContent = c.GP;
                document.getElementById('cl-pn').textContent = c.PN;
                document.getElementById('cl-pp').textContent = c.PP;
                document.getElementById('cl-p').textContent = c.P;
                document.getElementById('cl-pts').textContent = c.pts;
                document.getElementById('cl-pct').textContent = `(${c.pct}%)`;
                document.getElementById('cl-lien').href = `stats-classement.html?saison=${saisonStats}`;
                document.getElementById('résumé-classement').style.display = 'flex';
            }

            // Combine upcoming + played, sorted by noPartie ascending
            donnéesParties = [...(data.partiesÀVenir || []), ...(data.parties || [])]
                .sort((a, b) => a.noPartie - b.noPartie);
            afficherParties(donnéesParties);
            afficherJoueurs(data.joueurs);
        }

        function afficherParties(parties) {
            const tbody = document.getElementById('tbodyParties');
            if (parties.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--gris);padding:30px;">Aucune partie</td></tr>';
                return;
            }

            tbody.innerHTML = parties.map(p => {
                const estTerminée = p.terminée;

                // Score
                let scoreHtml = '';
                if (estTerminée && p.scoreA !== null && p.scoreB !== null) {
                    const aGagne = p.scoreA > p.scoreB;
                    const bGagne = p.scoreB > p.scoreA;
                    scoreHtml = `<span class="${aGagne ? 'score-gagnant' : 'score-perdant'}">${p.scoreA}</span>
                        <span style="color:var(--gris);font-size:0.5em;font-family:'Inter',sans-serif;"> — </span>
                        <span class="${bGagne ? 'score-gagnant' : 'score-perdant'}">${p.scoreB}</span>`;
                } else {
                    scoreHtml = `<span class="score-avenir">à venir</span>`;
                }

                // Liens
                let liensHtml = '';
                if (p.lienRéunion && !estTerminée) {
                    liensHtml += `<a href="${p.lienRéunion}" target="_blank" class="lien-bouton lien-teams">📹 Teams</a>`;
                }
                if (!estTerminée) {
                    liensHtml += `<a href="joueur.html?noPartie=${p.noPartie}" class="lien-bouton lien-rejoindre">▶ Rejoindre</a>`;
                }
                if (estTerminée) {
                    liensHtml += `<a href="stats-match.html?noPartie=${p.noPartie}" class="lien-bouton lien-match">📋 Feuille</a>`;
                }

                const lienÉquipeA = `<a href="stats-equipe.html?noEquipe=${p.noÉquipeA}&saison=${saisonStats}" style="color:inherit;text-decoration:none;">${p.nomÉquipeA}</a>`;
                const lienÉquipeB = `<a href="stats-equipe.html?noEquipe=${p.noÉquipeB}&saison=${saisonStats}" style="color:inherit;text-decoration:none;">${p.nomÉquipeB}</a>`;

                return `
                    <tr class="ligne-partie">
                        <td style="width:40px;padding:8px;">
                            <button class="btn-expand" id="btn-${p.noPartie}" onclick="toggleExpand(${p.noPartie})"
                                ${!estTerminée ? 'style="visibility:hidden"' : ''}>+</button>
                        </td>
                        <td style="color:var(--gris);font-size:0.85em;">${p.noPartie}</td>
                        <td class="date">${formaterDate(p.date)}</td>
                        <td class="équipe" style="text-align:right;">${lienÉquipeA}</td>
                        <td class="score">${scoreHtml}</td>
                        <td class="équipe">${lienÉquipeB}</td>
                        <td class="liens">${liensHtml}</td>
                    </tr>
                    <tr class="ligne-expand" id="expand-${p.noPartie}">
                        <td colspan="7" style="padding:0;">
                            <div class="zone-joueurs" id="joueurs-${p.noPartie}">Chargement...</div>
                        </td>
                    </tr>`;
            }).join('');
        }

        function afficherJoueurs(joueurs) {
            const tbody = document.getElementById('tbodyJoueurs');
            tbody.innerHTML = joueurs.map((j, i) => {
                const ptsPJ = j.ptsPJ > 0 ? j.ptsPJ.toFixed(2) : '—';
                return `<tr>
                    <td class="rang">${i + 1}</td>
                    <td class="gauche"><a href="stats-joueur.html?noEquipe=${noÉquipe}&noJoueur=${j.noJoueur}" style="color:inherit;text-decoration:none;">${j.alias}${j.nom ? ` <span style="font-weight:400;color:var(--gris);">${j.nom}</span>` : ''}</a></td>
                    <td>${j.pj || '—'}</td>
                    <td class="pts">${j.pts || '—'}</td>
                    <td>${ptsPJ}</td>
                </tr>`;
            }).join('');
        }

        function toggleExpand(noPartie) {
            const ligne = document.getElementById(`expand-${noPartie}`);
            const btn = document.getElementById(`btn-${noPartie}`);
            const estOuvert = ligne.classList.contains('visible');
            if (estOuvert) {
                ligne.classList.remove('visible');
                btn.classList.remove('ouvert');
                btn.textContent = '+';
            } else {
                ligne.classList.add('visible');
                btn.classList.add('ouvert');
                btn.textContent = '−';
                chargerJoueursPartie(noPartie);
            }
        }

        async function chargerJoueursPartie(noPartie) {
            const partie = donnéesParties.find(p => p.noPartie === noPartie);
            if (!partie) return;
            const div = document.getElementById(`joueurs-${noPartie}`);
            const data = await fetch(`/api/stats/partie/${noPartie}/joueurs`).then(r => r.json());

            const rendreListe = (équipeData) => {
                if (!équipeData || équipeData.joueurs.length === 0)
                    return '<em style="color:var(--gris)">Aucun joueur</em>';
                return équipeData.joueurs.map(j => `
                    <div class="joueur-ligne">
                        <a href="stats-joueur.html?noEquipe=${équipeData.noÉquipe}&noJoueur=${j.noJoueur}" style="color:inherit;text-decoration:none;">
                            ${j.alias}${j.nom ? ` <span style="opacity:0.7;font-size:0.9em;">${j.nom}</span>` : ''}
                        </a>
                        <span class="pts ${j.points === 0 ? 'pts-zero' : ''}">${j.points} pts</span>
                    </div>`).join('');
            };

            const [équipeA, équipeB] = data;
            const titreÉquipe = (nom, éq) => {
                const col = éq?.pointsCollectifs > 0
                    ? `<span class="pts" style="float:right">${éq.pointsCollectifs} pts</span>`
                    : '';
                return `${nom}${col}`;
            };
            div.innerHTML = `
                <div class="grille-joueurs">
                    <div class="colonne-équipe">
                        <h4>${titreÉquipe(partie.nomÉquipeA, équipeA)}</h4>
                        ${rendreListe(équipeA)}
                    </div>
                    <div class="colonne-équipe">
                        <h4>${titreÉquipe(partie.nomÉquipeB, équipeB)}</h4>
                        ${rendreListe(équipeB)}
                    </div>
                </div>`;
        }

        function formaterDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('fr-CA', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        fetch('/api/stats/phase').then(r => r.json()).then(d => {
            if (d.phase === 'eliminations') document.getElementById('lien-eliminations').style.display = '';
        });
        chargerSélécteurSaison().then(() => charger());
        function toggleRessources(btn) { document.getElementById("menu-ressources").classList.toggle("ouvert"); }
        document.addEventListener("click", (e) => { if (!e.target.closest(".dropdown")) document.getElementById("menu-ressources").classList.remove("ouvert"); });
    </script>
</body>
</html>
