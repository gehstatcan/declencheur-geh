<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joueur - Génie en Herbe</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ============================================================
           Variables de couleurs — thème clair accessible WCAG AA
           Thème sombre original (pour revenir en arrière) :
             --fond: #0f0f1a;  --fond-carte: #1a1a2e;  --fond-champ: #16213e;
             --accent: #e94560;  --vert: #2ecc71;  --orange: #e67e22;
             --blanc: #ffffff;  --gris: #aaaaaa;
           ============================================================ */
        :root {
            --fond: #f0f0f7;
            --fond-carte: #ffffff;
            --fond-champ: #e4e4f0;
            --accent: #c0303f;
            --buzz: #FFD700;
            --buzz-texte: #000000;
            --vert: #1a7a42;
            --orange: #b85c00;
            --blanc: #1a1a2e;
            --gris: #555566;
            --rayon: 16px;
        }

        /* ============================================================
           Base
           ============================================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fond);
            color: var(--blanc);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        /* ============================================================
           En-tête avec icône SVG cerveau+ampoule
           ============================================================ */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        header svg {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            color: var(--blanc);
            letter-spacing: 2px;
            line-height: 1;
        }

        header h1 span {
            color: var(--accent);
        }

        /* ============================================================
           Statut — grand, contrasté, accessible
           aria-live pour lecteurs d'écran
           ============================================================ */
        #statut {
            width: 100%;
            max-width: 560px;
            font-size: 1.4em;
            font-weight: 600;
            padding: 18px 24px;
            border-radius: var(--rayon);
            background: var(--fond-carte);
            color: var(--blanc);
            margin-bottom: 20px;
            text-align: center;
            transition: background 0.3s, color 0.3s;
            border: 2px solid var(--fond-champ);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            /* Contraste #1a1a2e sur #ffffff = 17:1 ✅ WCAG AAA */
        }

        #statut.buzzé {
            background: var(--vert);
            color: #ffffff;
            font-size: 1.8em;
            /* Contraste blanc sur #1a7a42 = 8.5:1 ✅ WCAG AAA */
        }

        #statut.adverse {
            background: #c0392b;
            color: #ffffff;
            /* Contraste blanc sur #c0392b = 4.9:1 ✅ WCAG AA */
        }

        #statut.réplique {
            background: var(--orange);
            color: #ffffff;
            /* Contraste blanc sur #b85c00 = 4.5:1 ✅ WCAG AA */
        }

        #statut.équipe {
            background: #1a5f99;
            color: #ffffff;
            /* Contraste blanc sur #1a5f99 = 7:1 ✅ WCAG AA */
        }

        /* ============================================================
           Case à cocher toutes les parties
           Alignée à gauche, disparaît en mode jeu
           ============================================================ */
        #labelToutesParties {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95em;
            color: var(--gris);
            width: auto;
            cursor: pointer;
            align-self: flex-end;
            /* ← pousse vers la droite dans un conteneur flex */
        }

        #labelToutesParties input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ============================================================
           Zone inscription — encadrée pour visibilité en mode clair
           ============================================================ */
        #zoneInscription {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            background: var(--fond-carte);
            border: 2px solid var(--fond-champ);
            border-radius: var(--rayon);
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        #conteneurParties {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            /* ← espace entre le select et le label */
        }

        select,
        input[type="text"] {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            padding: 14px 16px;
            border-radius: var(--rayon);
            background: var(--fond-champ);
            color: var(--blanc);
            border: 2px solid var(--accent);
            outline: none;
            transition: border-color 0.2s;
            /* Contraste #1a1a2e sur #e4e4f0 = 11:1 ✅ WCAG AAA */
        }

        select:focus,
        input[type="text"]:focus {
            border-color: var(--buzz);
        }

        #nouveauNom {
            display: none;
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        /* ============================================================
           Bouton Je suis prêt
           ============================================================ */
        #boutonPrêt {
            display: none;
            width: 100%;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6em;
            letter-spacing: 2px;
            padding: 16px;
            background: var(--vert);
            color: #000000;
            border: none;
            border-radius: var(--rayon);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            /* Contraste noir sur vert = 7:1 ✅ WCAG AA */
        }

        #boutonPrêt:hover {
            background: #27ae60;
        }

        #boutonPrêt:active {
            transform: scale(0.98);
        }

        /* ============================================================
           Zone jeu — encadrée pour visibilité en mode clair
           ============================================================ */
        #zoneJeu {
            display: none;
            width: 100%;
            max-width: 560px;
            flex-direction: column;
            align-items: center;
            background: var(--fond-carte);
            border: 2px solid var(--fond-champ);
            border-radius: var(--rayon);
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        /* ============================================================
           Bouton BUZZ — très grand, jaune vif, accessible
           Contraste #000000 sur #FFD700 = 14:1 ✅ WCAG AAA
           ============================================================ */
        #boutonBuzz {
            width: 100%;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5em;
            letter-spacing: 4px;
            padding: 50px 20px;
            background: var(--buzz);
            color: var(--buzz-texte) !important;
            border: 3px solid rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.35);
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
            /* Accessible au clavier */
            outline: none;
        }

        #boutonBuzz:focus-visible {
            outline: 4px solid var(--accent);
            outline-offset: 4px;
        }

        #boutonBuzz:hover {
            box-shadow: 0 14px 50px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        #boutonBuzz:active {
            transform: scale(0.97);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
        }

        #boutonBuzz:disabled {
            background: #ccccdd;
            color: #888899;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ============================================================
           Responsive — téléphone vs laptop
           ============================================================ */
        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8em;
            }

            #statut {
                font-size: 1.2em;
            }

            #statut.buzzé {
                font-size: 1.5em;
            }

            #boutonBuzz {
                font-size: 3.5em;
                padding: 40px 20px;
            }
        }

        @media (min-width: 768px) {
            #boutonBuzz {
                font-size: 6em;
                padding: 70px 40px;
            }

            #statut {
                font-size: 1.6em;
            }
        }
    </style>
</head>

<body>

    <!-- En-tête avec icône SVG cerveau+ampoule blanc -->
    <header>
        <img src="/ampouleQuiz.png" alt="Logo Génie en Herbe" style="width:52px; height:52px; mix-blend-mode:multiply;">
        <h1>GEH — Statcan</h1>
    </header>

    <!-- Statut — aria-live pour lecteurs d'écran -->
    <div id="statut" role="status" aria-live="polite">
        Choisissez votre partie
    </div>

    <!-- Zone inscription -->
    <div id="zoneInscription">

        <!-- Sélecteur de parties avec case à cocher alignée à droite -->
        <div id="conteneurParties">
            <select id="listeParties" onchange="chargerÉquipes()" aria-label="Choisir une partie">
                <option value="">-- Choisir une partie --</option>
            </select>
            <label id="labelToutesParties">
                Afficher toutes les parties
                <input type="checkbox" id="toutesParties" onchange="toggleToutesParties()">
            </label>
        </div>

        <select id="listeÉquipes" onchange="chargerJoueurs()" style="display:none" aria-label="Choisir votre équipe">
            <option value="">-- Choisir votre équipe --</option>
        </select>

        <select id="listeJoueurs" onchange="vérifierNouveauJoueur()" style="display:none"
            aria-label="Choisir votre nom">
            <option value="">-- Choisir votre nom --</option>
        </select>

        <div id="nouveauNom">
            <input id="champAlias" type="text" placeholder="Alias (affiché à l'écran)..." aria-label="Alias" />
            <input id="champPrénom" type="text" placeholder="Prénom..." aria-label="Prénom" />
            <input id="champNom" type="text" placeholder="Nom de famille..." aria-label="Nom de famille" />
        </div>

        <button id="boutonPrêt" onclick="sEnregistrer()" aria-label="Joindre la partie">
            ✅ JOINDRE LA PARTIE
        </button>

    </div><!-- fin zoneInscription -->

    <!-- Zone jeu -->
    <div id="zoneJeu">
        <button id="boutonBuzz" onclick="buzzer()" aria-label="Buzzer pour répondre">
            🔔 BUZZ !
        </button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let toutesÉquipes = [];
        let tousJoueurs = [];
        let joueurActuel = null;
        let noPartieActuelle = null;
        let modeActuel = 'initialisation';
        let questionEstÉquipe = false;

        // ============================================================
        // Feedback vibration — pour le joueur presque aveugle
        // Fonctionne principalement sur mobile
        // ============================================================
        function vibrer(motif) {
            if (navigator.vibrate) navigator.vibrate(motif);
        }

        // ============================================================
        // Réception de l'état global de la partie
        // ============================================================
        socket.on("état", (état) => {
            modeActuel = état.mode;
            console.log('État reçu:', état.mode, état.noPartie);
            if (état.mode === "jeu" && joueurActuel) {
                // Partie en cours et joueur enregistré
                passerEnModeJeu();
            } else if (état.mode === "jeu" && !joueurActuel) {
                // Partie en cours mais joueur pas encore enregistré — cas A/C/D/H
                document.getElementById('statut').textContent =
                    '⚠️ Partie en cours — Identifiez-vous pour jouer !';
                passerEnModeInscription();
            } else if (état.mode === "terminée") {
                document.getElementById('zoneJeu').style.display = 'none';
                document.getElementById('zoneInscription').style.display = 'none';
                afficherRésuméPartie(état.noPartie);
            } else {
                // Mode initialisation
                passerEnModeInscription();
                // Avertir si la partie a déjà des répondants
                if (état.aDesRépondants) {
                    document.getElementById('statut').textContent =
                        '⚠️ Cette partie semble déjà terminée. Vérifiez le numéro de partie !';
                }
            }
        });

        // ============================================================
        // Quelqu'un a buzzé — feedback visuel et vibration
        // ============================================================
        socket.on("buzz", (joueur) => {
            const btn = document.getElementById("boutonBuzz");
            const statut = document.getElementById("statut");

            if (joueurActuel &&
                joueur.noJoueur === joueurActuel.noJoueur &&
                joueur.noÉquipe === joueurActuel.noÉquipe) {
                // C'est moi qui ai buzzé — vibration longue
                statut.textContent = `🎯 À toi de répondre, ${joueurActuel.alias} !`;
                statut.className = "buzzé";
                vibrer([200, 100, 200]);
            } else {
                // Quelqu'un d'autre — vibration courte
                statut.textContent = `🔔 ${joueur.alias} a buzzé en premier !`;
                statut.className = "adverse";
                vibrer([100]);
            }
            btn.disabled = true;
        });

        // ============================================================
        // Reset — réactiver le buzzer pour la prochaine question
        // ============================================================
        socket.on('reset', () => {
            const btn = document.getElementById('boutonBuzz');
            const statut = document.getElementById('statut');
            btn.disabled = false;
            if (questionEstÉquipe) {
                statut.className = 'équipe';
                statut.textContent = '👥 Question d\'équipe !';
            } else {
                statut.className = '';
                statut.textContent = joueurActuel ? `🎯 À vous de jouer, ${joueurActuel.alias} !` : '';
            }
        });

        // ============================================================
        // Question d'équipe — afficher un message sur le buzzer
        // ============================================================
        socket.on('questionMisÀJour', (info) => {
            questionEstÉquipe = !!(info && info.estÉquipe);
        });

        // ============================================================
        // Droit de réplique
        // ============================================================
        socket.on('réplique', (noÉquipe) => {
            if (!joueurActuel) return;
            const btn = document.getElementById('boutonBuzz');
            const statut = document.getElementById('statut');

            if (joueurActuel.noÉquipe === noÉquipe) {
                btn.disabled = false;
                statut.textContent = '↩️ Droit de réplique — À vous !';
                statut.className = 'réplique';
                vibrer([100, 50, 100, 50, 100]);
            } else {
                btn.disabled = true;
                statut.textContent = '↩️ Droit de réplique — Équipe adverse...';
                statut.className = 'adverse';
            }
        });

        // ============================================================
        // Passer en mode jeu — cacher inscription, montrer BUZZ
        // ============================================================
        function passerEnModeJeu() {
            document.getElementById('zoneInscription').style.display = 'none';
            document.getElementById('zoneJeu').style.display = 'flex';
            document.getElementById('boutonBuzz').style.display = 'block';
            // Cacher la case à cocher une fois en mode jeu
            document.getElementById('labelToutesParties').style.display = 'none';
            if (joueurActuel) {
                const statut = document.getElementById('statut');
                statut.textContent = `🎯 À vous de jouer, ${joueurActuel.alias} !`;
                statut.className = '';
            }
        }

        // ============================================================
        // Passer en mode inscription
        // ============================================================
        function passerEnModeInscription() {
            document.getElementById("zoneInscription").style.display = "flex";
            document.getElementById("zoneJeu").style.display = "none";
        }

        // ============================================================
        // Chargement initial
        // ============================================================
        let toutesParties = [];
        let partiesFiltrees = [];

        async function chargerDonnées() {
            toutesÉquipes = await fetch("/api/equipes").then(r => r.json());
            tousJoueurs = await fetch("/api/joueurs").then(r => r.json());
            toutesParties = await fetch("/api/parties").then(r => r.json());

            const ilxjours = new Date();
            ilxjours.setDate(ilxjours.getDate() - 5);
            const dateMin = ilxjours.toISOString().split('T')[0];
            partiesFiltrees = toutesParties.filter(p => p.date >= dateMin);

            // Pré-sélectionner la partie si noPartie est dans l'URL
            const noPartieURL = parseInt(new URLSearchParams(location.search).get('noPartie'));
            if (noPartieURL) {
                const dansFiltrées = partiesFiltrees.find(p => p.noPartie === noPartieURL);
                if (!dansFiltrées) {
                    document.getElementById('toutesParties').checked = true;
                    remplirSélecteur(toutesParties);
                } else {
                    remplirSélecteur(partiesFiltrees);
                }
                const select = document.getElementById('listeParties');
                const optionCible = Array.from(select.options).find(o => parseInt(o.value) === noPartieURL);
                console.log('[joueur] noPartieURL=', noPartieURL, 'option trouvée=', !!optionCible, 'dansFiltrées=', !!dansFiltrées, 'toutesParties.length=', toutesParties.length);
                if (optionCible) {
                    optionCible.selected = true;
                    chargerÉquipes();
                }
            } else {
                remplirSélecteur(partiesFiltrees);
            }
        }

        function remplirSélecteur(liste) {
            const select = document.getElementById('listeParties');
            select.innerHTML = '<option value="">-- Choisir une partie --</option>';
            liste.forEach(p => {
                const éA = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeA);
                const éB = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeB);
                const option = document.createElement('option');
                option.value = p.noPartie;
                option.textContent =
                    `#${p.noPartie} — ${p.date} — ${éA?.nomÉquipe || 'À déterminer'} vs ${éB?.nomÉquipe || 'À déterminer'}`;
                select.appendChild(option);
            });
        }

        function toggleToutesParties() {
            const afficherTout = document.getElementById('toutesParties').checked;
            remplirSélecteur(afficherTout ? toutesParties : partiesFiltrees);
        }

        // ============================================================
        // Charger les équipes après sélection de la partie
        // ============================================================
        function chargerÉquipes() {
            const noPartie = parseInt(
                document.getElementById("listeParties").value);
            if (!noPartie) return;

            // Rejoindre la room Socket.io de cette partie
            noPartieActuelle = noPartie;
            socket.emit('rejoindrePartie', noPartie);

            fetch("/api/parties").then(r => r.json()).then(parties => {
                const partie = parties.find(p => p.noPartie === noPartie);
                const selectÉquipes = document.getElementById("listeÉquipes");
                selectÉquipes.innerHTML =
                    '<option value="">-- Choisir votre équipe --</option>';

                [partie.noÉquipeA, partie.noÉquipeB].filter(Boolean).forEach(noÉquipe => {
                    const équipe = toutesÉquipes.find(e => e.noÉquipe === noÉquipe);
                    const option = document.createElement("option");
                    option.value = noÉquipe;
                    option.textContent = équipe?.nomÉquipe || 'À déterminer';
                    selectÉquipes.appendChild(option);
                });

                selectÉquipes.style.display = "block";
                document.getElementById("statut").textContent =
                    "Choisissez votre équipe";
            });
        }

        // ============================================================
        // Charger les joueurs après sélection de l'équipe
        // ============================================================
        function chargerJoueurs() {
            const noÉquipe = parseInt(
                document.getElementById("listeÉquipes").value);
            if (!noÉquipe) return;

            const membres = tousJoueurs.filter(
                j => j.noÉquipe === noÉquipe && !j.estÉquipe);

            const selectJoueurs = document.getElementById("listeJoueurs");
            selectJoueurs.innerHTML =
                '<option value="">-- Choisir votre nom --</option>';

            membres.forEach(j => {
                const option = document.createElement("option");
                option.value = j.noJoueur;
                option.textContent = [j.prénom, j.nom].filter(Boolean).join(' ') || j.alias;
                selectJoueurs.appendChild(option);
            });

            const optionNouveau = document.createElement("option");
            optionNouveau.value = "nouveau";
            optionNouveau.textContent = "➕ Je suis un nouveau joueur";
            selectJoueurs.appendChild(optionNouveau);

            selectJoueurs.style.display = "block";
            document.getElementById("statut").textContent =
                "Choisissez votre nom";
        }

        async function afficherRésuméPartie(noPartie) {
            const statut = document.getElementById('statut');
            statut.style.display = 'block';
            statut.className = '';
            statut.innerHTML = '<div>🏁 Chargement du résumé...</div>';

            try {
                // Charger calendrier pour les scores
                const parties = await fetch('/api/stats/calendrier').then(r => r.json());
                const partie = parties.find(p => p.noPartie === noPartie);

                // Charger compteurs pour les alias des joueurs
                const compteurs = await fetch('/api/stats/compteurs').then(r => r.json());

                // Charger points de cette partie spécifique
                const ptsPartie = await fetch(`/api/stats/partie/${noPartie}`).then(r => r.json());

                // Charger alignements pour savoir qui a joué
                const alignements = await fetch('/api/alignements').then(r => r.json());
                const alignPartie = alignements.filter(a => a.noPartie === noPartie);

                if (!partie || !partie.terminée) {
                    statut.innerHTML = `<div>🏁 Cette partie est terminée.</div>`;
                    return;
                }

                const scoreMax = Math.max(partie.scoreA || 0, partie.scoreB || 0);

                const résumé = [
                    { nomÉquipe: partie.nomÉquipeA, score: partie.scoreA },
                    { nomÉquipe: partie.nomÉquipeB, score: partie.scoreB }
                ].map(é => {
                    const équipeStats = compteurs.find(c => c.nomÉquipe === é.nomÉquipe);
                    const align = alignPartie.find(a => a.noÉquipe === équipeStats?.noÉquipe);

                    const joueurs = align && équipeStats
                        ? [
                            // Joueurs individuels
                            ...align.joueurs
                                .filter(nj => nj !== 99)
                                .map(nj => {
                                    const j = équipeStats.joueurs.find(j => j.noJoueur === nj);
                                    const ptsP = ptsPartie.find(p =>
                                        p.noÉquipe === équipeStats.noÉquipe && p.noJoueur === nj);
                                    return {
                                        alias: j?.alias || `Joueur ${nj}`,
                                        points: ptsP?.points || 0
                                    };
                                })
                                .sort((a, b) => b.points - a.points),
                            // Points collectifs
                            ...(() => {
                                const collectif = ptsPartie.find(p =>
                                    p.noÉquipe === équipeStats.noÉquipe && p.noJoueur === 99);
                                return collectif && collectif.points > 0
                                    ? [{ alias: é.nomÉquipe, points: collectif.points }]
                                    : [];
                            })()
                        ]
                        : [];
                    return { ...é, joueurs };
                });

                const estGagnant = (score) => score === scoreMax;

                const maxJoueurs = Math.max(résumé[0].joueurs.length, résumé[1].joueurs.length);
                const cellBg = 'background:var(--fond-carte); color:var(--blanc);';

                statut.innerHTML = `
            <div style="margin-bottom:16px; font-family:'Bebas Neue',sans-serif;
                 font-size:1.4em; letter-spacing:1px;">
                🏁 Partie terminée !
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 12px;
                        max-width:680px; margin:0 auto;">
                ${résumé.map(é => `
                <div style="${cellBg} border-radius:14px 14px 0 0; padding:12px 16px 0;
                     font-weight:700; font-size:1em; text-align:center;
                     display:flex; align-items:center; justify-content:center;">
                    ${estGagnant(é.score) ? '⭐ ' : ''}${é.nomÉquipe}
                </div>`).join('')}
                ${résumé.map(é => `
                <div style="${cellBg} padding:4px 16px 10px; font-family:'Bebas Neue',sans-serif;
                     font-size:2.5em; text-align:center; letter-spacing:2px;">
                    ${é.score}
                </div>`).join('')}
                ${résumé.map(() => `
                <div style="${cellBg} padding:0 16px 6px;">
                    <div style="border-top:1px solid rgba(0,0,0,0.12);"></div>
                </div>`).join('')}
                ${Array.from({length: maxJoueurs}, (_, i) =>
                    résumé.map(é => {
                        const j = é.joueurs[i];
                        return `<div style="${cellBg} padding:4px 16px;
                             border-bottom:1px solid rgba(255,255,255,0.1);
                             display:flex; justify-content:space-between; font-size:0.85em;
                            border-bottom:1px solid rgba(0,0,0,0.08);">
                            ${j ? `<span>${j.alias}</span>
                            <span style="font-weight:600; min-width:40px; text-align:right;
                                  white-space:nowrap;">${j.points > 0 ? j.points : '—'}</span>` : '&nbsp;'}
                        </div>`;
                    }).join('')
                ).join('')}
                ${résumé.map(() => `
                <div style="${cellBg} border-radius:0 0 14px 14px; height:12px;"></div>`).join('')}
            </div>`;
            } catch (e) {
                statut.innerHTML = `<div>🏁 Partie terminée.</div>`;
                console.error('Erreur résumé:', e);
            }
        }

        // ============================================================
        // Le serveur demande au joueur de se réenregistrer
        // Arrive quand l'animateur revient après une déconnexion
        // ============================================================
        socket.on('réenregistrer', () => {
            if (joueurActuel) {
                // Réenregistrer silencieusement sans déranger le joueur
                socket.emit('sEnregistrer', joueurActuel);
                console.log('🔄 Réenregistrement automatique');
            }
        });

        // ============================================================
        // Partie terminée — afficher le résumé avec équipes et joueurs
        // ============================================================
        socket.on('partieTerminée', ({ scores, résumé }) => {
            document.getElementById('zoneJeu').style.display = 'none';
            document.getElementById('zoneInscription').style.display = 'none';
            afficherRésuméPartie(noPartieActuelle);
        });

        // ============================================================
        // Afficher les champs nouveau joueur si nécessaire
        // ============================================================
        function vérifierNouveauJoueur() {
            const val = document.getElementById("listeJoueurs").value;
            const divNouveau = document.getElementById("nouveauNom");
            const boutonPrêt = document.getElementById("boutonPrêt");

            if (val === "nouveau") {
                divNouveau.style.display = "flex";
                boutonPrêt.style.display = "block";
            } else if (val) {
                divNouveau.style.display = "none";
                boutonPrêt.style.display = "block";
            } else {
                divNouveau.style.display = "none";
                boutonPrêt.style.display = "none";
            }
        }

        // ============================================================
        // S'enregistrer comme joueur. S'exécute lorsque le joueur clique "joindre la partie".
        // ============================================================
        // ============================================================
        // S'enregistrer comme joueur pour la partie
        // Si la partie est déjà en cours, passer directement en mode jeu
        // ============================================================
        async function sEnregistrer() {
            const noÉquipe = parseInt(
                document.getElementById("listeÉquipes").value);
            const valJoueur = document.getElementById("listeJoueurs").value;
            const équipe = toutesÉquipes.find(e => e.noÉquipe === noÉquipe);

            let alias, noJoueur;

            if (valJoueur === "nouveau") {
                alias = document.getElementById("champAlias").value.trim();
                const prénom = document.getElementById("champPrénom").value.trim();
                const nom = document.getElementById("champNom").value.trim();

                if (!alias || !prénom || !nom) {
                    document.getElementById("statut").textContent =
                        "⚠️ Veuillez remplir tous les champs !";
                    return;
                }

                const nouveauJoueur = await fetch("/api/joueurs/nouveau", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ noÉquipe, alias, prénom, nom }),
                }).then(r => r.json());

                noJoueur = nouveauJoueur.noJoueur;
                tousJoueurs.push(nouveauJoueur);
            } else {
                noJoueur = parseInt(valJoueur);
                const joueur = tousJoueurs.find(
                    j => j.noÉquipe === noÉquipe && j.noJoueur === noJoueur);
                alias = joueur.alias;
            }

            joueurActuel = {
                noPartie: noPartieActuelle,
                noÉquipe,
                noJoueur,
                alias,
                nomÉquipe: équipe.nomÉquipe,
            };

            socket.emit("sEnregistrer", joueurActuel);

            // Cacher la case à cocher et la zone inscription
            document.getElementById('conteneurParties').style.display = 'none';
            document.getElementById("zoneInscription").style.display = "none";


            document.getElementById("statut").textContent = `✅ Bienvenue ${alias} ! En attente du début de la partie...`;

        }

        // ============================================================
        // Buzzer — émet l'événement au serveur
        // ============================================================
        function buzzer() {
            if (joueurActuel) {
                // Noter l'heure du clic pour calculer le temps de réaction
                socket.emit("buzz", joueurActuel);
            }
        }

        // ============================================================
        // Écoute clavier — Enter ou Espace pour buzzer
        // ============================================================
        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                const btn = document.getElementById("boutonBuzz");
                if (btn.style.display !== "none" && !btn.disabled) buzzer();
            }
        });

        chargerDonnées();
    </script>
</body>

</html>
