<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Joueur - Génie en Herbe</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            margin-top: 20px;
        }

        select,
        input {
            font-size: 1em;
            padding: 10px;
            border-radius: 10px;
            background: #16213e;
            color: white;
            border: 1px solid #e94560;
            margin: 10px;
            width: 80%;
        }

        .bouton {
            font-size: 1em;
            padding: 12px 30px;
            margin: 10px;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #boutonPrêt {
            background: #2ecc71;
            width: 80%;
            font-size: 1.2em;
        }

        #boutonPrêt:hover {
            background: #27ae60;
        }

        #boutonBuzz {
            font-size: 3em;
            padding: 40px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            margin-top: 20px;
            display: none;
        }

        #boutonBuzz:active {
            background: #c73652;
            transform: scale(0.95);
        }

        #boutonBuzz:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #statut {
            margin: 15px;
            font-size: 1.1em;
            padding: 10px;
            border-radius: 10px;
            background: #16213e;
        }

        #zoneInscription {
            display: block;
        }

        #zoneJeu {
            display: none;
        }

        #nouveauNom {
            display: none;
        }
    </style>
</head>

<body>
    <h1>🎯 Génie en Herbe</h1>

    <div id="statut">Choisissez votre partie</div>

    <label id="labelToutesParties" style="font-size: 0.9em; color: #aaa;">
        <input type="checkbox" id="toutesParties" onchange="toggleToutesParties()">
        Afficher toutes les parties
    </label>

    <!-- Zone inscription -->
    <div id="zoneInscription">
        <select id="listeParties" onchange="chargerÉquipes()">
            <option value="">-- Choisir une partie --</option>
        </select>

        <select id="listeÉquipes" onchange="chargerJoueurs()" style="display: none">
            <option value="">-- Choisir votre équipe --</option>
        </select>

        <select id="listeJoueurs" onchange="vérifierNouveauJoueur()" style="display: none">
            <option value="">-- Choisir votre nom --</option>
        </select>

        <div id="nouveauNom">
            <input id="champAlias" type="text" placeholder="Alias (affiché à l'écran)..." />
            <input id="champPrénom" type="text" placeholder="Prénom..." />
            <input id="champNom" type="text" placeholder="Nom de famille..." />
        </div>

        <br />
        <button class="bouton" id="boutonPrêt" onclick="sEnregistrer()" style="display: none">
            ✅ Je suis prêt !
        </button>
    </div>

    <!-- Zone jeu -->
    <div id="zoneJeu">
        <button id="boutonBuzz" onclick="buzzer()">BUZZ !</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let toutesÉquipes = [];
        let tousJoueurs = [];
        let joueurActuel = null;
        let noPartieActuelle = null; // numéro de la partie choisie par le joueur

        // Réception de l'état global
        socket.on("état", (état) => {
            if (état.mode === "jeu") {
                passerEnModeJeu();
            } else {
                passerEnModeInscription();
            }
        });

        // Buzzer bloqué après le premier buzz
        socket.on("buzz", (joueur) => {
            const btn = document.getElementById("boutonBuzz");
            if (
                joueurActuel &&
                joueur.noJoueur === joueurActuel.noJoueur &&
                joueur.noÉquipe === joueurActuel.noÉquipe
            ) {
                document.getElementById("statut").textContent =
                    "🔔 Vous avez buzzé !";
            } else {
                document.getElementById("statut").textContent =
                    `🔔 ${joueur.alias} a buzzé en premier !`;
            }
            btn.disabled = true;
        });

        socket.on('reset', () => {
            document.getElementById('boutonBuzz').disabled = false;
            document.getElementById('statut').textContent =
                joueurActuel ? `🎯 À vous de jouer, ${joueurActuel.alias} !` : '';
        });

        socket.on('réplique', (noÉquipe) => {
            if (!joueurActuel) return;
            const btn = document.getElementById('boutonBuzz');

            if (joueurActuel.noÉquipe === noÉquipe) {
                // C'est mon équipe qui a le droit de réplique
                btn.disabled = false;
                document.getElementById('statut').textContent =
                    '↩️ Droit de réplique — À vous de jouer !';
            } else {
                // Mon équipe ne peut pas répondre
                btn.disabled = true;
                document.getElementById('statut').textContent =
                    '↩️ Droit de réplique — Équipe adverse...';
            }
        });

        function passerEnModeJeu() {
            document.getElementById('zoneInscription').style.display = 'none';
            document.getElementById('zoneJeu').style.display = 'block';
            document.getElementById('boutonBuzz').style.display = 'block';
            // Cacher le checkbox une fois la partie lancée
            document.getElementById('labelToutesParties').style.display = 'none';
            if (joueurActuel) {
                document.getElementById('statut').textContent =
                    `🎯 À vous de jouer, ${joueurActuel.alias} !`;
            }
        }

        function passerEnModeInscription() {
            document.getElementById("zoneInscription").style.display = "block";
            document.getElementById("zoneJeu").style.display = "none";
        }

        // Chargement initial
        let toutesParties = [];
        let partiesFiltrees = [];

        async function chargerDonnées() {
            toutesÉquipes = await fetch("/api/equipes").then((r) => r.json());
            tousJoueurs = await fetch("/api/joueurs").then((r) => r.json());
            toutesParties = await fetch("/api/parties").then((r) => r.json());

            const ilxjours = new Date();
            ilxjours.setDate(ilxjours.getDate() - 5);
            const dateMin = ilxjours.toISOString().split('T')[0];
            partiesFiltrees = toutesParties.filter(p => p.date >= dateMin);

            remplirSélecteur(partiesFiltrees);
        }

        function remplirSélecteur(liste) {
            const select = document.getElementById('listeParties');
            select.innerHTML = '<option value="">-- Choisir une partie --</option>';
            liste.forEach(p => {
                const éA = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeA);
                const éB = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeB);
                const option = document.createElement('option');
                option.value = p.noPartie;
                option.textContent = `#${p.noPartie} — ${p.date} — ${éA.nomÉquipe} vs ${éB.nomÉquipe}`;
                select.appendChild(option);
            });
        }

        function toggleToutesParties() {
            const afficherTout = document.getElementById('toutesParties').checked;
            remplirSélecteur(afficherTout ? toutesParties : partiesFiltrees);
        }

        function chargerÉquipes() {
            const noPartie = parseInt(
                document.getElementById("listeParties").value,
            );
            if (!noPartie) return;

            // Rejoindre la room Socket.io de cette partie
            noPartieActuelle = noPartie;
            socket.emit('rejoindrePartie', noPartie);

            fetch("/api/parties")
                .then((r) => r.json())
                .then((parties) => {
                    const partie = parties.find((p) => p.noPartie === noPartie);
                    const selectÉquipes = document.getElementById("listeÉquipes");
                    selectÉquipes.innerHTML =
                        '<option value="">-- Choisir votre équipe --</option>';

                    [partie.noÉquipeA, partie.noÉquipeB].forEach((noÉquipe) => {
                        const équipe = toutesÉquipes.find((e) => e.noÉquipe === noÉquipe);
                        const option = document.createElement("option");
                        option.value = noÉquipe;
                        option.textContent = équipe.nomÉquipe;
                        selectÉquipes.appendChild(option);
                    });

                    selectÉquipes.style.display = "block";
                    document.getElementById("statut").textContent =
                        "Choisissez votre équipe";
                });
        }

        function chargerJoueurs() {
            const noÉquipe = parseInt(
                document.getElementById("listeÉquipes").value,
            );
            if (!noÉquipe) return;

            const membres = tousJoueurs.filter(
                (j) => j.noÉquipe === noÉquipe && !j.estÉquipe,
            );

            const selectJoueurs = document.getElementById("listeJoueurs");
            selectJoueurs.innerHTML =
                '<option value="">-- Choisir votre nom --</option>';

            membres.forEach((j) => {
                const option = document.createElement("option");
                option.value = j.noJoueur;
                option.textContent = j.alias;
                selectJoueurs.appendChild(option);
            });

            // Option pour nouveau joueur
            const optionNouveau = document.createElement("option");
            optionNouveau.value = "nouveau";
            optionNouveau.textContent = "➕ Je suis un nouveau joueur";
            selectJoueurs.appendChild(optionNouveau);

            selectJoueurs.style.display = "block";
            document.getElementById("statut").textContent = "Choisissez votre nom";
        }

        function vérifierNouveauJoueur() {
            const val = document.getElementById("listeJoueurs").value;
            const divNouveau = document.getElementById("nouveauNom");
            const boutonPrêt = document.getElementById("boutonPrêt");

            if (val === "nouveau") {
                divNouveau.style.display = "block";
                boutonPrêt.style.display = "inline-block";
            } else if (val) {
                divNouveau.style.display = "none";
                boutonPrêt.style.display = "inline-block";
            } else {
                divNouveau.style.display = "none";
                boutonPrêt.style.display = "none";
            }
        }

        async function sEnregistrer() {
            const noÉquipe = parseInt(
                document.getElementById("listeÉquipes").value,
            );
            const valJoueur = document.getElementById("listeJoueurs").value;
            const équipe = toutesÉquipes.find((e) => e.noÉquipe === noÉquipe);

            let alias, noJoueur;

            if (valJoueur === "nouveau") {
                alias = document.getElementById("champAlias").value.trim();
                const prénom = document.getElementById("champPrénom").value.trim();
                const nom = document.getElementById("champNom").value.trim();

                if (!alias || !prénom || !nom) {
                    document.getElementById("statut").textContent =
                        "⚠️ Veuillez remplir tous les champs !";
                    return;
                }

                // Sauvegarder le nouveau joueur
                const nouveauJoueur = await fetch("/api/joueurs/nouveau", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ noÉquipe, alias, prénom, nom }),
                }).then((r) => r.json());

                noJoueur = nouveauJoueur.noJoueur;

                // Ajouter à la liste locale
                tousJoueurs.push(nouveauJoueur);
            } else {
                noJoueur = parseInt(valJoueur);
                const joueur = tousJoueurs.find(
                    (j) => j.noÉquipe === noÉquipe && j.noJoueur === noJoueur,
                );
                alias = joueur.alias;
            }

            joueurActuel = {
                noPartie: noPartieActuelle,
                noÉquipe,
                noJoueur,
                alias,
                nomÉquipe: équipe.nomÉquipe,
            };
            socket.emit("sEnregistrer", joueurActuel);

            document.getElementById("statut").textContent =
                `✅ Bienvenue ${alias} ! En attente du début de la partie...`;
            document.getElementById("zoneInscription").style.display = "none";
        }

        function buzzer() {
            if (joueurActuel) {
                // noPartie est inclus dans joueurActuel
                socket.emit("buzz", joueurActuel);
            }
        }

        // Écoute clavier
        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                const btn = document.getElementById("boutonBuzz");
                if (btn.style.display !== "none" && !btn.disabled) {
                    buzzer();
                }
            }
        });

        function toggleToutesParties() {
            console.log('toggle appelé, toutesParties:', toutesParties.length, 'filtrees:', partiesFiltrees.length);
            const afficherTout = document.getElementById('toutesParties').checked;
            remplirSélecteur(afficherTout ? toutesParties : partiesFiltrees);
        }

        chargerDonnées();
    </script>
</body>

</html>
