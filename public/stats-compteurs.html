<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Compteurs — GEH Statcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --fond: #f5f0e8;
            --fond-carte: #ede8dc;
            --fond-champ: #e0d9cc;
            --accent: #2c3e50;
            --vert: #27ae60;
            --blanc: #ffffff;
            --texte: #2c2c2c;
            --gris: #888888;
            --rayon: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fond);
            color: var(--texte);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            color: var(--texte);
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent);
        }

        nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            font-size: 0.95em;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--gris);
            background: var(--fond-carte);
            border: 1px solid var(--fond-champ);
            transition: all 0.2s;
        }

        nav a:hover {
            background: var(--fond-champ);
            color: var(--texte);
        }

        nav a.actif {
            background: var(--accent);
            color: var(--blanc);
            border-color: var(--accent);
        }

        h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8em;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-align: center;
        }

        h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3em;
            color: var(--texte);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .section {
            width: 100%;
            max-width: 900px;
            margin-bottom: 32px;
        }

        .tableau-conteneur {
            width: 100%;
            background: var(--blanc);
            border-radius: var(--rayon);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        thead th {
            background: var(--fond-champ);
            color: var(--texte);
            font-weight: 600;
            padding: 10px 14px;
            text-align: center;
            border-bottom: 1px solid var(--fond-champ);
            font-size: 0.9em;
        }

        thead th.gauche {
            text-align: left;
        }

        .th-tri:hover { background: var(--fond-carte); }
        .th-tri.actif { color: var(--accent); font-weight: 700; }

        tbody tr.ligne-joueur {
            border-bottom: 1px solid var(--fond-carte);
            transition: background 0.15s;
        }

        tbody tr.ligne-joueur:hover {
            background: var(--fond);
        }

        tbody tr.ligne-expand {
            display: none;
        }

        tbody tr.ligne-expand.visible {
            display: table-row;
        }

        td {
            padding: 9px 14px;
            text-align: center;
            vertical-align: middle;
        }

        td.gauche {
            text-align: left;
        }

        td.rang {
            color: var(--gris);
            width: 40px;
        }

        td.pts {
            font-weight: 700;
        }

        td.gris {
            color: var(--gris);
            font-size: 0.88em;
        }

        /* Bouton expand */
        .btn-expand {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .btn-expand:hover {
            background: var(--accent);
            color: white;
        }

        .btn-expand.ouvert {
            background: var(--accent);
            color: white;
        }

        /* Zone expand détail parties */
        .zone-détail {
            padding: 12px 16px 16px 52px;
            background: var(--fond);
            border-top: 1px solid var(--fond-champ);
        }

        .détail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .détail-table th {
            background: var(--fond-champ);
            padding: 6px 10px;
            text-align: center;
            font-weight: 600;
            color: var(--texte);
            border-bottom: 1px solid var(--fond-carte);
        }

        .détail-table th.gauche {
            text-align: left;
        }

        .détail-table th.droite {
            text-align: right;
        }

        .détail-table td {
            padding: 5px 10px;
            border-bottom: 1px solid var(--fond-carte);
            text-align: center;
        }

        .détail-table td.gauche {
            text-align: left;
        }

        .détail-table td.droite {
            text-align: right;
        }

        .détail-table tr:last-child td {
            border-bottom: none;
        }

        .pts-joueur {
            font-weight: 700;
            color: var(--accent);
        }

        .note-bas {
            margin-top: 8px;
            font-size: 0.82em;
            color: var(--gris);
            text-align: center;
            width: 100%;
            max-width: 900px;
        }

        .onglets {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            background: var(--fond-carte);
            padding: 6px;
            border-radius: 24px;
        }

        .onglets button {
            padding: 7px 20px;
            border: none;
            border-radius: 18px;
            background: transparent;
            color: var(--gris);
            font-family: 'Inter', sans-serif;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .onglets button:hover { color: var(--texte); }
        .onglets button.actif { background: var(--accent); color: white; }

        .panneau { display: none; width: 100%; max-width: 900px; }
        .panneau.actif { display: block; }

        .thème-bloc {
            background: var(--blanc);
            border-radius: var(--rayon);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .thème-titre {
            background: var(--fond-champ);
            padding: 10px 16px;
            font-weight: 700;
            font-size: 0.95em;
            color: var(--accent);
        }

        .thème-joueurs {
            display: flex;
            flex-direction: column;
        }

        .thème-joueur {
            display: flex;
            align-items: center;
            padding: 7px 16px;
            border-bottom: 1px solid var(--fond-carte);
            gap: 10px;
        }

        .thème-joueur:last-child { border-bottom: none; }
        .thème-rang { color: var(--gris); font-size: 0.85em; width: 28px; text-align: center; flex-shrink: 0; }
        .thème-alias { font-weight: 600; }
        .thème-nom { font-weight: 400; color: var(--gris); font-size: 0.88em; margin-left: 4px; }
        .thème-equipe { margin-left: auto; padding-left: 12px; }
        .thème-equipe a { color: var(--accent); text-decoration: none; font-size: 0.85em; font-weight: 600; background: var(--fond-champ); padding: 2px 8px; border-radius: 10px; }
        .thème-equipe a:hover { background: var(--fond-carte); }
        .thème-pts { font-weight: 700; color: var(--accent); min-width: 36px; text-align: right; flex-shrink: 0; }
        .thème-joueur.caché { display: none; }

        .themes-layout { display: flex; gap: 20px; width: 100%; align-items: flex-start; }

        .themes-sidebar {
            width: 180px;
            flex-shrink: 0;
            background: var(--blanc);
            border-radius: var(--rayon);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 8px;
            position: sticky;
            top: 16px;
            max-height: calc(100vh - 48px);
            overflow-y: auto;
        }

        .themes-sidebar a {
            display: block;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 0.84em;
            font-weight: 600;
            color: var(--texte);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        .themes-sidebar a:hover { background: var(--fond-champ); }
        .themes-sidebar a.actif { background: var(--accent); color: white; }

        .themes-contenu { flex: 1; min-width: 0; }

        .btn-voir-tout {
            margin: 8px 16px 12px;
            padding: 5px 14px;
            border: 1.5px solid var(--fond-champ);
            border-radius: 20px;
            background: transparent;
            color: var(--gris);
            font-size: 0.82em;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-voir-tout:hover { background: var(--fond-champ); color: var(--texte); }

        .btn-tout-afficher {
            margin-bottom: 16px;
            padding: 7px 18px;
            border: 1.5px solid var(--accent);
            border-radius: 20px;
            background: transparent;
            color: var(--accent);
            font-size: 0.88em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-tout-afficher:hover { background: var(--accent); color: white; }
        .btn-tout-afficher:disabled { opacity: 0.45; cursor: default; }
        .btn-tout-afficher:disabled:hover { background: transparent; color: var(--accent); }
    </style>
</head>

<body>

    <header>
        <img src="ampouleQuiz.png" alt="Logo GEH" style="width:52px; height:52px; mix-blend-mode:multiply;">
        <h1>GEH — <span>Statcan</span></h1>
    </header>

    <nav>
        <a href="stats-calendrier.html">📅 Calendrier</a>
        <a href="stats-classement.html">🏆 Classement</a>
        <a href="stats-compteurs.html" class="actif">📊 Compteurs</a>
        <a href="stats-match.html">📋 Feuille de match</a>
    </nav>

    <h2>📊 Compteurs 2025-2026</h2>

    <div class="onglets">
        <button class="actif" onclick="afficherOnglet('joueurs', this)">Joueurs</button>
        <button onclick="afficherOnglet('themes', this)">Par thème</button>
        <button onclick="afficherOnglet('équipes', this)">Équipes</button>
    </div>

    <!-- Panneau équipes -->
    <div id="panneau-équipes" class="panneau">
    <div class="section">
        <h3>Points d'équipe</h3>
        <div class="tableau-conteneur">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th class="gauche th-tri" data-table="équipes" data-col="nomÉquipe">Équipe</th>
                        <th class="th-tri" data-table="équipes" data-col="pjÉquipe">PJ</th>
                        <th class="th-tri actif" data-table="équipes" data-col="ptsÉquipeCollectif">Pts ▼</th>
                        <th class="th-tri" data-table="équipes" data-col="ptsPJCollectif">Pts/PJ</th>
                    </tr>
                </thead>
                <tbody id="tbodyÉquipes">
                    <tr>
                        <td colspan="5" style="text-align:center; color:var(--gris); padding:30px;">
                            Chargement...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    </div><!-- fin panneau équipes -->

    <!-- Panneau joueurs -->
    <div id="panneau-joueurs" class="panneau actif">
    <div class="section">
        <h3>Les joueurs</h3>
        <div class="tableau-conteneur">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th class="gauche th-tri" data-table="joueurs" data-col="alias">Joueur</th>
                        <th class="gauche th-tri" data-table="joueurs" data-col="nomÉquipe">Équipe</th>
                        <th class="th-tri" data-table="joueurs" data-col="pj">PJ</th>
                        <th class="th-tri actif" data-table="joueurs" data-col="points">Pts ▼</th>
                        <th class="th-tri" data-table="joueurs" data-col="ptsPJ">Pts/PJ</th>
                    </tr>
                </thead>
                <tbody id="tbodyJoueurs">
                    <tr>
                        <td colspan="7" style="text-align:center; color:var(--gris); padding:30px;">
                            Chargement...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    </div><!-- fin panneau joueurs -->

    <!-- Panneau par thème -->
    <div id="panneau-themes" class="panneau">
        <div class="themes-layout">
            <div id="sidebarThèmes" class="themes-sidebar">
                <div style="text-align:center;color:var(--gris);padding:16px;font-size:0.85em;">Chargement...</div>
            </div>
            <div class="themes-contenu">
                <div id="contenuThemes">
                    <div style="text-align:center;color:var(--gris);padding:40px;">Chargement...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="note-bas">
        Calculé automatiquement depuis les parties terminées
    </div>

    <script>
        let donnéesCompteurs = [];
        let donnéesThèmes = null;
        const triÉtat = {
            équipes: { col: 'ptsÉquipeCollectif', dir: -1 },
            joueurs: { col: 'points', dir: -1 }
        };

        function afficherOnglet(id, btn) {
            document.querySelectorAll('.panneau').forEach(p => p.classList.remove('actif'));
            document.querySelectorAll('.onglets button').forEach(b => b.classList.remove('actif'));
            document.getElementById('panneau-' + id).classList.add('actif');
            btn.classList.add('actif');
            if (id === 'themes' && donnéesThèmes === null) chargerThèmes();
        }

        async function chargerCompteurs() {
            donnéesCompteurs = await fetch('/api/stats/compteurs').then(r => r.json());
            afficherÉquipes();
            afficherJoueurs();
        }

        async function chargerThèmes() {
            donnéesThèmes = await fetch('/api/stats/themes').then(r => r.json());
            const sidebar = document.getElementById('sidebarThèmes');
            const div = document.getElementById('contenuThemes');

            if (!donnéesThèmes.length) {
                sidebar.innerHTML = '';
                div.innerHTML = '<div style="text-align:center;color:var(--gris);padding:40px;">Aucune donnée</div>';
                return;
            }

            sidebar.innerHTML = donnéesThèmes.map((t, i) =>
                `<a id="nav-theme-${i}" onclick="navThème(${i})">${t.thème}</a>`
            ).join('');

            const toutBtn = `<button class="btn-tout-afficher" onclick="toutAfficher(this)">Tout afficher</button>`;

            div.innerHTML = toutBtn + donnéesThèmes.map((t, i) => {
                const joueursHtml = t.joueurs.map((j, idx) => `
                    <div class="thème-joueur${idx >= 5 ? ' caché' : ''}" data-theme="${i}">
                        <span class="thème-rang">${idx + 1}</span>
                        <span class="thème-alias"><a href="stats-joueur.html?noEquipe=${j.noÉquipe}&noJoueur=${j.noJoueur}" style="color:inherit;text-decoration:none;">${j.alias}</a>${j.nom ? `<span class="thème-nom">${j.nom}</span>` : ''}</span>
                        <span class="thème-equipe"><a href="stats-equipe.html?noEquipe=${j.noÉquipe}">${j.nomÉquipe}</a></span>
                        <span class="thème-pts">${j.pts}</span>
                    </div>`).join('');

                const voirToutBtn = t.joueurs.length > 5
                    ? `<button class="btn-voir-tout" onclick="voirTout(${i}, this)">Voir tout (${t.joueurs.length})</button>`
                    : '';

                return `
                    <div class="thème-bloc" id="theme-bloc-${i}">
                        <div class="thème-titre">${t.thème}</div>
                        <div class="thème-joueurs">${joueursHtml}</div>
                        ${voirToutBtn}
                    </div>`;
            }).join('');

            document.querySelector('#sidebarThèmes a')?.classList.add('actif');
        }

        function navThème(i) {
            document.querySelectorAll('#sidebarThèmes a').forEach(a => a.classList.remove('actif'));
            document.getElementById(`nav-theme-${i}`).classList.add('actif');
            document.getElementById(`theme-bloc-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function voirTout(i, btn) {
            document.querySelectorAll(`.thème-joueur[data-theme="${i}"].caché`).forEach(el => el.classList.remove('caché'));
            btn.remove();
        }

        function toutAfficher(btn) {
            document.querySelectorAll('.thème-joueur.caché').forEach(el => el.classList.remove('caché'));
            document.querySelectorAll('.btn-voir-tout').forEach(b => b.remove());
            btn.disabled = true;
            btn.textContent = 'Tout affiché ✓';
        }

        document.querySelectorAll('.th-tri').forEach(th => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const table = th.dataset.table;
                const col = th.dataset.col;
                if (triÉtat[table].col === col) {
                    triÉtat[table].dir *= -1;
                } else {
                    triÉtat[table].col = col;
                    triÉtat[table].dir = col === 'alias' || col === 'nomÉquipe' ? 1 : -1;
                }
                // Mettre à jour indicateurs
                th.closest('thead').querySelectorAll('.th-tri').forEach(t => {
                    t.classList.remove('actif');
                    t.textContent = t.textContent.replace(/ [▲▼]$/, '');
                });
                th.classList.add('actif');
                th.textContent += triÉtat[table].dir === 1 ? ' ▲' : ' ▼';
                table === 'équipes' ? afficherÉquipes() : afficherJoueurs();
            });
        });

        function trierPar(arr, col, dir) {
            return [...arr].sort((a, b) => {
                const va = a[col] ?? '';
                const vb = b[col] ?? '';
                if (typeof va === 'string') return dir * va.localeCompare(vb, 'fr');
                return dir * (va - vb);
            });
        }

        function afficherÉquipes() {
            const tbody = document.getElementById('tbodyÉquipes');
            const { col, dir } = triÉtat.équipes;
            const équipes = trierPar(
                donnéesCompteurs.filter(é => é.pjÉquipe > 0),
                col, dir
            );

            if (équipes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"
                    style="text-align:center; color:var(--gris); padding:30px;">
                    Aucune donnée pour l'instant
                </td></tr>`;
                return;
            }

            tbody.innerHTML = équipes.map((é, i) => {
                const pj = é.pjÉquipe || '—';
                const pts = é.ptsÉquipeCollectif || 0;
                const ptsPJ = é.pjÉquipe > 0 ? (pts / é.pjÉquipe).toFixed(2) : '—';

                return `<tr>
                    <td class="rang">${i + 1}</td>
                    <td class="gauche"><a href="stats-equipe.html?noEquipe=${é.noÉquipe}" style="color:inherit;text-decoration:none;font-weight:600;">${é.nomÉquipe}</a></td>
                    <td>${pj}</td>
                    <td class="pts">${pts}</td>
                    <td>${ptsPJ}</td>
                </tr>`;
            }).join('');
        }

        function afficherJoueurs() {
            const tbody = document.getElementById('tbodyJoueurs');
            const { col, dir } = triÉtat.joueurs;
            const tousJoueurs = trierPar(
                donnéesCompteurs.flatMap(é => é.joueurs
                    .filter(j => j.noJoueur !== 99 && j.points > 0)
                    .map(j => ({ ...j, nomÉquipe: é.nomÉquipe, ptsPJ: j.pj > 0 ? j.points / j.pj : 0 }))
                ),
                col, dir
            );

            if (tousJoueurs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"
                    style="text-align:center; color:var(--gris); padding:30px;">
                    Aucune donnée pour l'instant
                </td></tr>`;
                return;
            }

            tbody.innerHTML = tousJoueurs.map((j, i) => {
                const ptsPJ = j.pj > 0
                    ? (j.points / j.pj).toFixed(2)
                    : '—';

                return `
                    <tr class="ligne-joueur">
                        <td class="rang">${i + 1}</td>
                        <td class="gauche"><a href="stats-joueur.html?noEquipe=${j.noÉquipe}&noJoueur=${j.noJoueur}" style="color:inherit;text-decoration:none;">${j.alias}${j.nom ? ` <span style="font-weight:400;color:var(--gris);">${j.nom}</span>` : ''}</a></td>
                        <td class="gauche"><a href="stats-equipe.html?noEquipe=${j.noÉquipe}" style="color:var(--accent);text-decoration:none;font-weight:600;">${j.nomÉquipe}</a></td>
                        <td>${j.pj || '—'}</td>
                        <td class="pts">${j.points}</td>
                        <td>${ptsPJ}</td>
                    </tr>`;
            }).join('');
        }

        async function toggleDétail(idLigne, noÉquipe, noJoueur) {
            const ligneExpand = document.getElementById(`expand-${idLigne}`);
            const btn = document.getElementById(`btn-${idLigne}`);
            const estOuvert = ligneExpand.classList.contains('visible');

            console.log('toggleDétail appelé:', idLigne, noÉquipe, noJoueur);

            if (estOuvert) {
                ligneExpand.classList.remove('visible');
                btn.classList.remove('ouvert');
                btn.textContent = '+';
            } else {
                ligneExpand.classList.add('visible');
                btn.classList.add('ouvert');
                btn.textContent = '−';

                // Charger le détail
                const div = document.getElementById(`détail-${idLigne}`);
                div.innerHTML = 'Chargement...';

                const parties = await fetch(
                    `/api/stats/joueur/${noÉquipe}/${noJoueur}`
                ).then(r => r.json());

                if (parties.length === 0) {
                    div.innerHTML = '<em style="color:var(--gris)">Aucune partie</em>';
                    return;
                }

                div.innerHTML = `
                    <table class="détail-table">
                        <thead>
                            <tr>
                                <th class="gauche">Date</th>
                                <th class="droite">Équipe A</th>
                                <th>Pts</th>
                                <th>Pts</th>
                                <th class="gauche">Équipe B</th>
                                <th>Pts joueur</th>
                                <th>Pts A+B</th>
                                <th>joueur/A+B</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${parties.map(p => `
                                <tr>
                                    <td class="gauche">${formaterDate(p.date)}</td>
                                    <td class="droite">${p.nomÉquipeA}</td>
                                    <td>${p.scoreA}</td>
                                    <td>${p.scoreB}</td>
                                    <td class="gauche">${p.nomÉquipeB}</td>
                                    <td class="pts-joueur">${p.ptsJoueur}</td>
                                    <td>${p.ptsTotal}</td>
                                    <td>${p.pctJoueur}%</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`;
            }
        }

        function formaterDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('fr-CA', {
                month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        chargerCompteurs();
    </script>

</body>

</html>
