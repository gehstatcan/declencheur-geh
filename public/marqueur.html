<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>Marqueur - Génie en Herbe</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        /* ============================================================
       Variables de couleurs — thème clair accessible WCAG AA
       Thème sombre original (si on veut revenir) :
         --fond: #0f0f1a;  --fond-carte: #1a1a2e;  --fond-champ: #16213e;
         --accent: #e94560;  --vert: #2ecc71;  --orange: #e67e22;
         --blanc: #ffffff;  --gris: #aaaaaa;
       ============================================================ */
        :root {
            --fond: #f0f0f7;
            --fond-carte: #ffffff;
            --fond-champ: #e4e4f0;
            --accent: #c0303f;
            --buzz: #FFD700;
            --buzz-texte: #000000;
            --vert: #1a7a42;
            --orange: #b85c00;
            --blanc: #1a1a2e;
            --gris: #555566;
            --rayon: 16px;
        }

        /* ============================================================
       Base
       ============================================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fond);
            color: var(--blanc);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        /* ============================================================
       En-tête
       ============================================================ */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            color: var(--blanc);
            letter-spacing: 2px;
            line-height: 1;
        }

        header h1 span {
            color: var(--accent);
        }

        /* ============================================================
       Mode partie
       ============================================================ */
        #modePartie {
            font-size: 0.9em;
            margin-bottom: 16px;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-family: 'Inter', sans-serif;
        }

        #modePartie.initialisation {
            background: var(--orange);
            color: var(--buzz-texte);
        }

        #modePartie.jeu {
            background: var(--vert);
            color: var(--buzz-texte);
        }

        /* ============================================================
       Sélecteur de partie
       ============================================================ */
        select {
            width: 100%;
            max-width: 560px;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            padding: 14px 16px;
            border-radius: var(--rayon);
            background: var(--fond-champ);
            color: var(--blanc);
            border: 2px solid var(--accent);
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 8px;
        }

        select:focus {
            border-color: var(--accent);
        }

        #labelToutesParties {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95em;
            color: var(--gris);
            cursor: pointer;
            margin-bottom: 16px;
        }

        #labelToutesParties input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* ============================================================
       Scores
       ============================================================ */
        #scores {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            margin: 20px 0;
            width: 100%;
        }

        .score-équipe {
            background: var(--fond-carte);
            padding: 15px 24px;
            border-radius: var(--rayon);
            min-width: 160px;
            text-align: center;
        }

        .score-équipe h3 {
            color: var(--accent);
            margin: 0 0 8px 0;
            font-size: 0.9em;
            font-family: 'Inter', sans-serif;
        }

        .score-valeur {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3em;
            font-weight: normal;
            letter-spacing: 2px;
        }

        /* ============================================================
       Info question
       ============================================================ */
        #infoQuestion {
            background: var(--fond-carte);
            border: 1px solid var(--gris);
            padding: 16px 20px;
            border-radius: var(--rayon);
            margin: 10px auto;
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        #infoQuestion .série {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4em;
            color: var(--accent);
            letter-spacing: 1px;
        }

        #infoQuestion .thème {
            font-size: 1em;
            color: var(--gris);
            margin-top: 6px;
        }

        #infoQuestion .question {
            font-size: 1em;
            margin-top: 6px;
            color: var(--blanc);
        }

        #répondantExistant {
            margin-top: 10px;
            padding: 8px;
            background: var(--vert);
            border-radius: 8px;
            font-size: 0.9em;
            color: white;
            visibility: hidden;
            word-break: break-word;
        }

        /* ============================================================
       Buzzer
       ============================================================ */
        #buzzer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1em;
            letter-spacing: 2px;
            margin: 16px auto;
            padding: 15px;
            background: var(--fond-carte);
            border: 1px solid var(--gris);
            border-radius: var(--rayon);
            width: 100%;
            max-width: 700px;
            text-align: center;
            transition: background 0.3s;
        }

        #buzzer.actif {
            background: var(--accent);
            color: white;
            animation: flash 0.5s;
        }

        #buzzer.réplique {
            background: var(--orange);
            color: var(--buzz-texte);
        }

        @keyframes flash {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        /* ============================================================
       Boutons points
       ============================================================ */
        #boutonsPoints {
            display: none;
            margin: 10px 0;
            text-align: center;
        }

        #boutonAnnuler {
            visibility: hidden;
            pointer-events: none;
            margin-top: 10px;
            text-align: center;
        }

        .bouton {
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            padding: 12px 24px;
            margin: 5px;
            color: var(--blanc);
            border: none;
            border-radius: var(--rayon);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .bouton:active {
            transform: scale(0.97);
        }

        .bouton-bonne {
            background: var(--vert);
            color: var(--buzz-texte);
        }

        .bouton-bonne:hover {
            background: #27ae60;
        }

        .bouton-secondaire {
            background: var(--orange);
            color: var(--buzz-texte);
        }

        .bouton-secondaire:hover {
            background: #d35400;
        }

        .bouton-mauvaise {
            background: var(--accent);
        }

        .bouton-mauvaise:hover {
            background: #c0392b;
        }

        .bouton-action {
            background: var(--fond-champ);
            border: 1px solid var(--gris);
        }

        .bouton-action:hover {
            background: var(--fond-carte);
        }

        .bouton-orange {
            background: var(--orange);
            color: var(--buzz-texte);
        }

        .bouton-orange:hover {
            background: #d35400;
        }

        /* ============================================================
       Équipes et joueurs
       ============================================================ */
        #équipes {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 24px;
            width: 100%;
        }

        .équipe {
            background: var(--fond-carte);
            padding: 16px;
            border-radius: var(--rayon);
            min-width: 200px;
            text-align: center;
        }

        .équipe h2 {
            color: var(--accent);
            font-size: 0.95em;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
        }

        /* ============================================================
       Zone jeu
       ============================================================ */
        #zoneJeu {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        /* ============================================================
            Zone équipes — scores + joueurs côte à côte
        ============================================================ */
        #zone3colonnes {
            display: grid;
            grid-template-columns: 1fr 0.75fr 1fr;
            gap: 16px;
            margin-top: 16px;
            width: 100%;
            max-width: 1000px;
            align-items: start;
        }

        .bloc-équipe {
            flex: 1;
            background: var(--fond-carte);
            border: 1px solid var(--gris);
            border-radius: var(--rayon);
            padding: 20px;
            text-align: center;
            min-width: 200px;
        }

        .bloc-équipe h2 {
            color: var(--accent);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5em;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .score-valeur {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4.5em;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .joueur {
            padding: 8px 12px;
            margin: 4px auto;
            font-size: 2em;
            border-radius: 8px;
            background: var(--fond-champ);
            color: var(--blanc);
        }

        .joueur.connecté {
            background: var(--vert);
            color: var(--buzz-texte);
            font-weight: bold;
        }

        .joueur.cliquable {
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .joueur.cliquable:hover {
            background: var(--accent);
            color: white;
        }

        .nav-animateur { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .nav-animateur a { font-size: 0.9em; padding: 7px 16px; border-radius: 20px; text-decoration: none; color: var(--gris); background: var(--fond-carte); border: 1px solid var(--fond-champ); transition: all 0.2s; }
        .nav-animateur a:hover { background: var(--fond-champ); color: var(--texte); }
        .nav-animateur a.actif { background: var(--accent); color: var(--blanc); border-color: var(--accent); }
        .nav-animateur button { font-size: 0.9em; padding: 7px 16px; border-radius: 20px; color: var(--gris); background: var(--fond-carte); border: 1px solid var(--fond-champ); cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .nav-animateur button:hover { background: var(--fond-champ); color: var(--texte); }
    </style>
</head>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
    rel="stylesheet">

<body>
    <!-- En-tête identique à joueur.html -->
    <header>
        <img src="ampouleQuiz.png" alt="Logo GEH" style="width:52px; height:52px; mix-blend-mode:multiply;">
        <h1>GEH — <span>Statcan</span></h1>
    </header>

    <nav class="nav-animateur">
        <a href="admin.html">⚙️ Administration</a>
        <a href="marqueur.html" class="actif">🎮 Marqueur</a>
        <a href="test-sons.html">🔊 Test sons</a>
        <a href="guide-animateur.html">📖 Guide</a>
    </nav>

    <div id="modePartie" class="initialisation">🔧 Initialisation</div>

    <!-- Sélecteur de partie -->
    <div id="sélecteurPartie" style="width:100%; max-width:700px; text-align:center;">
        <select id="listeParties" onchange="choisirPartie()">
            <option value="">-- Choisir une partie --</option>
        </select>
        <div style="display:flex; justify-content:flex-end; margin-top:6px;">
            <label id="labelToutesParties">
                Afficher toutes les parties
                <input type="checkbox" id="toutesParties" onchange="toggleToutesParties()">
            </label>
        </div>
    </div>

    <!-- Zone initialisation -->
    <div id="zoneInitialisation" style="margin-top:16px;">
        <button class="bouton bouton-bonne" onclick="démarrerPartie()">
            ▶️ Démarrer la partie
        </button>
    </div>

    <!-- Layout 3 colonnes : équipe A | question | équipe B -->
    <div id="zone3colonnes" style="display:none;">
        <div id="blocÉquipeA" class="bloc-équipe"></div>

        <div id="infoQuestion">
            <div class="série" id="titreSérie">—</div>
            <div class="thème" id="titreThème">—</div>
            <div class="question" id="titreQuestion">—</div>
            <div id="modeÉquipe" style="visibility:hidden; margin-top:10px;">
                <span style="background:#c0303f; color:white; padding:4px 12px; border-radius:6px; font-weight:bold;">🏆 MODE ÉQUIPE</span>
            </div>
            <div id="toggleÉquipe" style="visibility:hidden;">
                <button id="btnToggleÉquipe" onclick="toggleModeÉquipe()" style="margin-top:8px; color:white; border:none; padding:6px 16px; border-radius:6px; cursor:pointer; font-size:0.9em;">—</button>
            </div>
            <div id="répondantExistant"></div>
        </div>

        <div id="blocÉquipeB" class="bloc-équipe"></div>
    </div>

    <!-- Zone de jeu -->
    <div id="zoneJeu">

        <!-- Buzzer -->
        <div id="buzzer">En attente d'un buzzer...</div>

        <!-- Boutons points -->
        <div id="boutonsPoints">
            <button class="bouton bouton-bonne" id="btnBonne" onclick="bonneRéponse(10)">
                ✅ 10 pts
            </button>
            <button class="bouton bouton-secondaire" id="btnSecondaire" onclick="bonneRéponse(5)" style="display:none">

        <!-- Bouton annuler -->
        <div id="boutonAnnuler">
            <button class="bouton" style="background:#7f8c8d;" onclick="annulerRéponse()">
                🗑️ Annuler la réponse
            </button>
        </div>

        <div style="text-align:center; margin-top:16px;">
            <button class="bouton bouton-action" onclick="sériePrécédente()">
                ⏮️ Série précédente
            </button>
            <button class="bouton bouton-action" onclick="questionPrécédente()">
                ◀️ Question précédente
            </button>
            <button class="bouton bouton-action" onclick="questionSuivante()">
                Question suivante ▶️
            </button>
            <button class="bouton bouton-action" onclick="sérieSuivante()">
                Série suivante ⏭️
            </button>
            <br>
            <button class="bouton bouton-orange" onclick="réinitialiser()">
                🔄 Retour initialisation
            </button>
            <button class="bouton" style="background:#8e44ad;" onclick="terminerPartie()">
                🏁 Terminer la partie
            </button>
        </div>

        <!-- Toggle points par joueur -->
        <div style="text-align:center; margin-top:8px;">
            <button id="btnPtsJoueurs" class="bouton" style="background:var(--fond-champ); color:var(--blanc); font-size:0.85em; padding:6px 16px;" onclick="togglePtsJoueurs()">
                📊 Afficher pts/joueur
            </button>
        </div>

        <!-- Volume et test des sons -->
        <div style="display:flex; align-items:center; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap;">
            <label style="font-size:0.9em; font-weight:600;">🔊 Volume buzzers</label>
            <input type="range" id="sliderVolume" min="0" max="4" step="0.1" value="2"
                style="width:140px; cursor:pointer;"
                oninput="gainMaître.gain.value = parseFloat(this.value); document.getElementById('valeurVolume').textContent = Math.round(this.value * 50) + '%'">
            <span id="valeurVolume" style="font-size:0.9em; color:var(--gris); min-width:36px;">100%</span>
            <button id="btnTestA" class="bouton" style="background:var(--fond-champ); color:var(--blanc); font-size:0.85em; padding:6px 14px;" onclick="testerSonÉquipe('A')">🔔 Équipe A</button>
            <button id="btnTestB" class="bouton" style="background:var(--fond-champ); color:var(--blanc); font-size:0.85em; padding:6px 14px;" onclick="testerSonÉquipe('B')">🔔 Équipe B</button>
        </div>

    </div>

    <div id="zoneTéléchargement" style="margin-top:16px; display:none;">
        <button class="bouton" style="background:#2980b9;" onclick="téléchargerPartie()">
            💾 Télécharger partie en cours
        </button>
        <button class="bouton" style="background:#1a5276;" onclick="téléchargerRépondants()">
            💾 Télécharger cumulatif
        </button>
    </div>

    <!-- Équipes et joueurs -->
    <div id="équipes"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let toutesÉquipes = [];
        let tousJoueurs = [];
        let toutesParties = [];
        let partiesFiltrees = [];
        let toutesLésSéries = [];
        let tousthèmes = [];
        let partieActuelle = null;
        let joueurAyantBuzzé = null;
        let modeActuel = 'initialisation';
        let derniersScores = {};
        let derniersScoresJoueurs = {};
        let afficherPtsJoueurs = false;
        // Conserver la liste des joueurs connectés entre les événements socket
        // Évite de passer [] par erreur lors des appels à afficherÉquipes()
        let derniersJoueursConnectés = [];

        // Web Audio pour les sons
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gainMaître = audioCtx.createGain();
        gainMaître.gain.value = 2.0; // Amplification globale — ajuster si trop fort
        gainMaître.connect(audioCtx.destination);

        function jouerSon(noÉquipe) {
            const équipe = toutesÉquipes.find(e => e.noÉquipe === noÉquipe);
            let idSon = équipe?.son;
            if (!idSon) {
                // Fallback selon position A ou B dans la partie
                const partie = toutesPartiesData.find(p => p.noPartie === partieActuelle);
                idSon = (partie?.noÉquipeA === noÉquipe) ? 'triple_bip' : 'montee_douce';
            }
            jouerSonParId(idSon);
        }

        function jouerSonParId(id) {
            const t = audioCtx.currentTime;
            function bip(type, freq, vol, début, durée, freqFin) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(gainMaître);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, début);
                if (freqFin !== undefined) osc.frequency.linearRampToValueAtTime(freqFin, début + durée);
                gain.gain.setValueAtTime(vol, début);
                gain.gain.exponentialRampToValueAtTime(0.001, début + durée);
                osc.start(début); osc.stop(début + durée);
            }
            switch (id) {
                case 'buzzer_tv':      bip('sawtooth', 200, 0.4, t, 0.4, 80); break;
                case 'ding_dong':      bip('sine', 880, 0.5, t, 0.25); bip('sine', 660, 0.5, t + 0.25, 0.25); break;
                case 'bip_grave':      bip('square', 150, 0.3, t, 0.5); break;
                case 'alarme_montante':bip('sawtooth', 300, 0.4, t, 0.4, 650); break;
                case 'triple_bip':     bip('sine', 880, 0.5, t, 0.12); bip('sine', 880, 0.5, t + 0.16, 0.12); bip('sine', 880, 0.5, t + 0.32, 0.12); break;
                case 'cloche':         bip('triangle', 1046, 0.6, t, 0.9); break;
                case 'klaxon':         bip('sawtooth', 220, 0.2, t, 0.5); bip('sawtooth', 440, 0.2, t, 0.5); break;
                case 'bip_aigu':       bip('sine', 1320, 0.4, t, 0.3); break;
                case 'descente_rapide':bip('sine', 800, 0.5, t, 0.35, 200); break;
                case 'double_bip':     bip('sine', 660, 0.5, t, 0.15); bip('sine', 660, 0.5, t + 0.2, 0.15); break;
                case 'montee_douce':   bip('sine', 440, 0.45, t, 0.4, 880); break;
                case 'gong':           bip('triangle', 220, 0.7, t, 1.2); break;
                default:               bip('sine', 440, 0.5, t, 0.8);
            }
        }

        // Réception état global
        socket.on('état', (état) => {
            modeActuel = état.mode;
            derniersScores = état.scores || {};
            derniersScoresJoueurs = état.scoresJoueurs || {};
            derniersJoueursConnectés = état.joueursConnectés || []; // Sauvegarder les joueurs connectés reçus du serveur
            partieActuelle = état.noPartie;
            mettreÀJourMode(état.mode);
            if (état.noPartie) {
                document.getElementById('listeParties').value = état.noPartie;
                afficherÉquipes(état.noPartie, état.joueursConnectés, état.scores);
            }
            if (état.mode === 'jeu') {
                mettreÀJourScores(état.scores);
            }
        });

        // ============================================================
        // Reprise après plantage — afficher un message détaillé
        // avec double confirmation si l'animateur veut repartir à zéro
        // ============================================================
        socket.on('repriseDetectée', ({ nbRépondants, noSérie, noQuestion, scores }) => {

            // Première fenêtre — informer et proposer la reprise
            const continuer = confirm(
                `🔄 Reprise détectée pour cette partie !\n\n` +
                `${nbRépondants} question(s) déjà répondue(s)\n` +
                `Reprise à Série ${noSérie} — Question ${noQuestion}\n\n` +
                `Cliquez OK pour continuer cette partie\n` +
                `Cliquez Annuler pour repartir de zéro`
            );

            if (continuer) {
                // Reprendre — mettre à jour les scores affichés
                mettreÀJourScores(scores);
                console.log('✅ Reprise confirmée');
            } else {
                // Deuxième confirmation — avertir que les points seront perdus
                const confirmerEffacement = confirm(
                    `⚠️ ATTENTION !\n\n` +
                    `Vous êtes sur le point de supprimer\n` +
                    `${nbRépondants} réponse(s) déjà enregistrée(s).\n\n` +
                    `Les points seront perdus définitivement.\n\n` +
                    `Êtes-vous certain de vouloir repartir à zéro ?`
                );

                if (confirmerEffacement) {
                    // Repartir à zéro
                    socket.emit('réinitialiserPartie', partieActuelle);
                    console.log('🗑️ Partie réinitialisée');
                } else {
                    // L'animateur a changé d'avis — reprendre quand même
                    mettreÀJourScores(scores);
                    console.log('✅ Reprise confirmée après hésitation');
                }
            }
        });

        socket.on('joueursConnectés', async (joueursConnectés) => {
            tousJoueurs = await fetch('/api/joueurs').then(r => r.json());
            derniersJoueursConnectés = joueursConnectés; // Mettre à jour la liste des joueurs connectés, Arrivée d'un retardataire ou déconnexion d'un joueur
            if (partieActuelle) afficherÉquipes(partieActuelle, joueursConnectés, derniersScores);
        });

        socket.on('buzz', (joueur) => {
            joueurAyantBuzzé = joueur;
            jouerSon(joueur.noÉquipe);
            const buzzer = document.getElementById('buzzer');

            const tempsTexte = joueur.tempsRéaction ? ` ⚡ ${joueur.tempsRéaction}ms` : ''; //Pour avoir le temps de réaction
            //const tempsTexte = '' //Sans le temps de réaction
            buzzer.textContent = `🔔 ${joueur.alias} (${joueur.nomÉquipe}) a buzzé !${tempsTexte}`;
            buzzer.className = 'actif';

            afficherÉquipes(partieActuelle, derniersJoueursConnectés, derniersScores);

            // Afficher les boutons de points
            const { série, question } = obtenirQuestionCourante();

            const pts = question ? question.points : 10;
            document.getElementById('btnBonne').textContent = `✅ ${pts} pts`;
            document.getElementById('btnBonne').onclick = () => bonneRéponse(pts);

            const ptsSecondaires = question ? question.pointsSecondaires : 5;
            document.getElementById('btnSecondaire').textContent = `✅ ${ptsSecondaires} pts`;
            document.getElementById('btnSecondaire').onclick = () => bonneRéponse(ptsSecondaires, true);

            
            document.getElementById('btnSecondaire').style.display =
                (question && question.pointsSecondaires > 0) ? 'inline-block' : 'none';
            document.getElementById('boutonsPoints').style.display = 'block';
        });

        // ============================================================
        // Demande de confirmation à l'animateur quand une question
        // a déjà une réponse enregistrée — évite les doublons
        // ============================================================
        socket.on('confirmerÉcrasement', ({ noÉquipe, noJoueur, points, estSecondaire, ancienRépondant }) => {
            const équipe = toutesÉquipes.find(e => e.noÉquipe === ancienRépondant.noÉquipe);
            const nomÉquipe = équipe ? équipe.nomÉquipe : `Équipe ${ancienRépondant.noÉquipe}`;

            // Si noJoueur = 99, c'est une réponse d'équipe — pas de joueur individuel
            let nomAncien;
            if (ancienRépondant.noJoueur === 99) {
                nomAncien = 'Équipe';
            } else {
                const joueur = tousJoueurs.find(j =>
                    j.noÉquipe === ancienRépondant.noÉquipe &&
                    j.noJoueur === ancienRépondant.noJoueur
                );
                nomAncien = joueur ? joueur.alias : `Joueur ${ancienRépondant.noJoueur}`;
            }

            const confirmer = confirm(
                `⚠️ Cette question a déjà une réponse enregistrée !\n` +
                `Ancien répondant : ${nomAncien} (${nomÉquipe})\n\n` +
                `Voulez-vous remplacer cette réponse ?`
            );

            if (confirmer) {
                socket.emit('confirmerÉcrasement', { noPartie: partieActuelle, noÉquipe, noJoueur, points, estSecondaire });
            }
        });

        socket.on('reset', () => {
            joueurAyantBuzzé = null;
            afficherÉquipes(partieActuelle, derniersJoueursConnectés, derniersScores);
            const buzzer = document.getElementById('buzzer');
            buzzer.textContent = 'En attente d\'un buzzer...';
            buzzer.className = '';
            document.getElementById('boutonsPoints').style.display = 'none';
        });

        socket.on('réplique', (noÉquipe) => {
            joueurAyantBuzzé = null;
            const équipe = toutesÉquipes.find(e => e.noÉquipe === noÉquipe);
            const buzzer = document.getElementById('buzzer');
            buzzer.textContent = `↩️ Droit de réplique — ${équipe ? équipe.nomÉquipe : ''}`;
            buzzer.className = 'réplique';
            document.getElementById('boutonsPoints').style.display = 'none';
        });

        socket.on('scoresMisÀJour', ({ scores, scoresJoueurs }) => {
            derniersScores = scores;
            derniersScoresJoueurs = scoresJoueurs || {};
            mettreÀJourScores(scores);
            afficherÉquipes(partieActuelle, derniersJoueursConnectés, scores);
        });

        socket.on('questionMisÀJour', (info) => {
            if (info) afficherInfoQuestion(info);
        });

        // Actions animateur
        function choisirPartie() {
            const noPartie = parseInt(document.getElementById('listeParties').value);
            if (!noPartie) return;
            socket.emit('rejoindrePartie', noPartie);
            socket.emit('choisirPartie', noPartie);

            // Mettre à jour les boutons de test de son
            const partie = toutesPartiesData.find(p => p.noPartie === noPartie);
            const équipeA = toutesÉquipes.find(e => e.noÉquipe === partie?.noÉquipeA);
            const équipeB = toutesÉquipes.find(e => e.noÉquipe === partie?.noÉquipeB);
            const btnA = document.getElementById('btnTestA');
            const btnB = document.getElementById('btnTestB');
            btnA.textContent = `🔔 ${équipeA?.nomÉquipe || 'Équipe A'}`;
            btnB.textContent = `🔔 ${équipeB?.nomÉquipe || 'Équipe B'}`;
        }

        function testerSonÉquipe(position) {
            const noPartie = parseInt(document.getElementById('listeParties').value);
            const partie = toutesPartiesData.find(p => p.noPartie === noPartie);
            if (!partie) return;
            const noÉquipe = position === 'A' ? partie.noÉquipeA : partie.noÉquipeB;
            jouerSon(noÉquipe);
        }
        function démarrerPartie() {
            socket.emit('démarrerPartie', partieActuelle);
        }
        function réinitialiser() {
            socket.emit('réinitialiser', partieActuelle);
        }

        function bonneRéponse(points, estSecondaire = false) {
            if (!joueurAyantBuzzé) return;
            socket.emit('attribuerPoints', {
                noPartie: partieActuelle,
                noÉquipe: joueurAyantBuzzé.noÉquipe,
                noJoueur: joueurAyantBuzzé.noJoueur,
                points,
                estSecondaire
            });
        }

        function buzzManuel(noÉquipe, noJoueur, alias, nomÉquipe) {
            if (modeActuel !== 'jeu') return;
            joueurAyantBuzzé = { noÉquipe, noJoueur, alias, nomÉquipe };
            jouerSon(noÉquipe);
            const buzzer = document.getElementById('buzzer');
            buzzer.textContent = `👆 ${alias} (${nomÉquipe}) — attribution manuelle`;
            buzzer.className = 'actif';
            afficherÉquipes(partieActuelle, derniersJoueursConnectés, derniersScores);
            const { série, question } = obtenirQuestionCourante();
            const pts = question ? question.points : 10;
            document.getElementById('btnBonne').textContent = `✅ ${pts} pts`;
            document.getElementById('btnBonne').onclick = () => bonneRéponse(pts);
            const ptsSecondaires = question ? question.pointsSecondaires : 5;
            document.getElementById('btnSecondaire').textContent = `✅ ${ptsSecondaires} pts`;
            document.getElementById('btnSecondaire').onclick = () => bonneRéponse(ptsSecondaires, true);
            document.getElementById('btnSecondaire').style.display =
                (question && question.pointsSecondaires > 0) ? 'inline-block' : 'none';
            document.getElementById('boutonsPoints').style.display = 'block';
        }

        function mauvaiseRéponse() {
            if (!joueurAyantBuzzé) return;
            socket.emit('mauvaiseRéponse', {
                noPartie: partieActuelle,
                noÉquipe: joueurAyantBuzzé.noÉquipe
            });
        }

        // Navigation
        function questionPrécédente() {
            socket.emit('questionPrécédente', partieActuelle);
        }

        function questionSuivante() {
            socket.emit('questionSuivante', partieActuelle);
        }

        function sériePrécédente() {
            socket.emit('sériePrécédente', partieActuelle);
        }

        function sérieSuivante() {
            socket.emit('sérieSuivante', partieActuelle);
        }

        // Affichage
        function mettreÀJourMode(mode) {
            const badge = document.getElementById('modePartie');
            const zoneJeu = document.getElementById('zoneJeu');
            const zoneInit = document.getElementById('zoneInitialisation');
            const labelParties = document.getElementById('labelToutesParties');
            const sélecteurPartie = document.getElementById('sélecteurPartie');

            document.getElementById('infoQuestion').style.display =
                mode === 'jeu' ? 'block' : 'none';

            const zone3colonnes = document.getElementById('zone3colonnes');
            const zoneTéléchargement = document.getElementById('zoneTéléchargement');

            if (mode === 'jeu') {
                badge.textContent = 'Partie en cours';
                badge.className = 'jeu';
                zoneJeu.style.display = 'block';
                zoneInit.style.display = 'none';
                sélecteurPartie.style.display = 'none';
                labelParties.style.display = 'none';
                zone3colonnes.style.display = 'grid';
                zone3colonnes.style.justifyContent = '';
                zone3colonnes.style.gap = '';
                zoneTéléchargement.style.display = 'block';
            } else {
                badge.textContent = '🔧 Initialisation';
                badge.className = 'initialisation';
                zoneJeu.style.display = 'none';
                zoneInit.style.display = 'block';
                sélecteurPartie.style.display = 'block';
                labelParties.style.display = 'inline';
                zone3colonnes.style.display = 'flex';
                zone3colonnes.style.justifyContent = 'center';
                zone3colonnes.style.gap = '16px';
                zoneTéléchargement.style.display = 'none';
            }
        }

        function mettreÀJourScores(scores) {
            if (!partieActuelle) return;
            derniersScores = scores;
            afficherÉquipes(partieActuelle, derniersJoueursConnectés, scores);
        }

        function togglePtsJoueurs() {
            afficherPtsJoueurs = !afficherPtsJoueurs;
            const btn = document.getElementById('btnPtsJoueurs');
            btn.textContent = afficherPtsJoueurs ? '📊 Cacher pts/joueur' : '📊 Afficher pts/joueur';
            btn.style.background = afficherPtsJoueurs ? 'var(--accent)' : 'var(--fond-champ)';
            btn.style.color = afficherPtsJoueurs ? 'white' : 'var(--blanc)';
            afficherÉquipes(partieActuelle, derniersJoueursConnectés, derniersScores);
        }

        function obtenirQuestionCourante() {
            // Utiliser les données reçues via socket.on('questionMisÀJour')
            if (questionCouranteInfo) {
                return {
                    série: questionCouranteInfo.série,
                    question: questionCouranteInfo.question
                };
            }
            return { série: null, question: null };
        }

        let questionCouranteInfo = null;

        function afficherInfoQuestion(info) {
            questionCouranteInfo = info;
            const { série, question, répondantExistant, estÉquipe } = info;
            if (!série || !question) return;

            document.getElementById('titreSérie').textContent =
                `Série ${série.noSérie} — ${série.typeSérie}`;
            document.getElementById('titreQuestion').textContent =
                `Question ${question.noQuestion} / ${série.questions.length} — ${question.points} pts`;

            // Afficher bouton annuler si répondant existant
            const btnAnnuler = document.getElementById('boutonAnnuler');
            btnAnnuler.style.visibility = répondantExistant ? 'visible' : 'hidden';
            btnAnnuler.style.pointerEvents = répondantExistant ? 'auto' : 'none';

            // ============================================================
            // Indicateur MODE ÉQUIPE
            // ============================================================
            const divModeÉquipe = document.getElementById('modeÉquipe');
            divModeÉquipe.style.visibility = estÉquipe ? 'visible' : 'hidden';

            const divToggle = document.getElementById('toggleÉquipe');
            const btnToggle = document.getElementById('btnToggleÉquipe');
            if (question && question.estÉquipe === null) {
                btnToggle.style.background = estÉquipe ? '#1a7a42' : '#666';
                btnToggle.textContent = estÉquipe
                    ? '🏆 Équipe — cliquer pour Individuel'
                    : '👤 Individuel — cliquer pour Équipe';
                divToggle.style.visibility = 'visible';
            } else {
                divToggle.style.visibility = 'hidden';
            }

            // Afficher le répondant existant si la question a déjà été répondue
            const divRépondant = document.getElementById('répondantExistant');
            if (répondantExistant) {
                const équipe = toutesÉquipes.find(e => e.noÉquipe === répondantExistant.noÉquipe);
                const joueur = tousJoueurs.find(j =>
                    j.noÉquipe === répondantExistant.noÉquipe &&
                    j.noJoueur === répondantExistant.noJoueur
                );
                const alias = joueur ? joueur.alias : `Joueur ${répondantExistant.noJoueur}`;
                const nomÉquipe = équipe ? équipe.nomÉquipe : `Équipe ${répondantExistant.noÉquipe}`;
                divRépondant.textContent = `✅ Déjà répondue par ${alias} (${nomÉquipe})`;
                divRépondant.style.visibility = 'visible';
            } else {
                divRépondant.textContent = '';
                divRépondant.style.visibility = 'hidden';
            }

            // Trouver le thème dans le questionnaire
            if (partieActuelle) {
                fetch('/api/parties').then(r => r.json()).then(parties => {
                    const partie = parties.find(p => p.noPartie === partieActuelle);
                    if (!partie) return;
                    fetch('/api/themes').then(r => r.json()).then(thèmes => {
                        const thèmeQuestionnaire = thèmes.find(
                            t => t.noQuestionnaire === partie.noQuestionnaire
                        );
                        if (!thèmeQuestionnaire) {
                            console.log('Questionnaire non trouvé:', partie.noQuestionnaire, 'dans', thèmes);
                            return;
                        }
                        const thèmeSérie = thèmeQuestionnaire.séries.find(s => s.noSérie === série.noSérie);
                        if (thèmeSérie) {
                            let thème = thèmeSérie.thème;
                            if (thèmeSérie.sousThème) thème += ` — ${thèmeSérie.sousThème}`;
                            document.getElementById('titreThème').textContent = thème;
                        }
                    });
                });
            }
            console.log('Parties filtrées:', partiesFiltrées);

        }

        // ============================================================
        // Toggle manuel Individuel/Équipe pour série 5
        // ============================================================
        function toggleModeÉquipe() {
            socket.emit('toggleÉquipe', partieActuelle);
        }

        function afficherÉquipes(noPartie, joueursConnectés, scores) {
            fetch('/api/parties').then(r => r.json()).then(parties => {
                const partie = parties.find(p => p.noPartie === noPartie);
                if (!partie) return;
                [partie.noÉquipeA, partie.noÉquipeB].forEach((noÉquipe, idx) => {
                    const div = document.getElementById(idx === 0 ? 'blocÉquipeA' : 'blocÉquipeB');
                    const équipe = toutesÉquipes.find(e => e.noÉquipe === noÉquipe);
                    const membres = tousJoueurs.filter(j => {
                        if (j.noÉquipe !== noÉquipe || j.estÉquipe) return false;
                        if (modeActuel === 'jeu') {
                            // En mode jeu — seulement les joueurs connectés à la partie
                            return joueursConnectés.some(
                                c => c.noÉquipe === j.noÉquipe && c.noJoueur === j.noJoueur);
                        }
                        return true; // En initialisation — tous les joueurs
                    });
                    const score = scores ? (scores[noÉquipe] || 0) : 0;

                    const joueursHTML = membres.map(j => {
                        let classe = '';
                        let icône = '⚪';

                        if (modeActuel === 'initialisation') {
                            // Mode initialisation — vert si connecté
                            const connecté = joueursConnectés.some(
                                c => c.noÉquipe === j.noÉquipe && c.noJoueur === j.noJoueur);
                            if (connecté) { classe = 'connecté'; icône = '🟢'; }
                        } else {
                            // Mode jeu — vert seulement si c'est le buzzeur
                            const estBuzzeur = joueurAyantBuzzé &&
                                joueurAyantBuzzé.noÉquipe === j.noÉquipe &&
                                joueurAyantBuzzé.noJoueur === j.noJoueur;
                            if (estBuzzeur) { classe = 'connecté'; icône = '🟢'; }
                        }

                        const pts = afficherPtsJoueurs ? (derniersScoresJoueurs[`${j.noÉquipe}_${j.noJoueur}`] || 0) : null;
                        const ptsHTML = pts !== null ? ` <span style="font-weight:700;color:var(--accent);margin-left:6px;">${pts}</span>` : '';
                        const nomÉquipeSafe = (équipe?.nomÉquipe || '').replace(/'/g, "\\'");
                        const aliasSafe = j.alias.replace(/'/g, "\\'");
                        const cliquable = modeActuel === 'jeu' ? 'cliquable' : '';
                        const onclick = modeActuel === 'jeu'
                            ? `onclick="buzzManuel(${j.noÉquipe}, ${j.noJoueur}, '${aliasSafe}', '${nomÉquipeSafe}')"`
                            : '';
                        return `<div class="joueur ${classe} ${cliquable}" ${onclick} style="display:flex;justify-content:space-between;align-items:center;">${j.alias}${ptsHTML}</div>`;



                    }).join('');

                    div.innerHTML = `
                    <h2>${équipe ? équipe.nomÉquipe : ''}</h2>
                    <div class="score-valeur">${score}</div>
                    ${joueursHTML}`;
                });
            });
        }

        // Chargement initial
        let toutesPartiesData = [];
        let partiesFiltrées = [];

        async function chargerDonnées() {
            toutesÉquipes = await fetch('/api/equipes').then(r => r.json());
            tousJoueurs = await fetch('/api/joueurs').then(r => r.json());
            toutesPartiesData = await fetch('/api/parties').then(r => r.json());
            toutesLésSéries = await fetch('/api/series').then(r => r.json());
            tousthèmes = await fetch('/api/themes').then(r => r.json());

            const aujourdhui = new Date();
            const dateAvant = new Date(aujourdhui);
            const dateAprès = new Date(aujourdhui);
            dateAvant.setDate(aujourdhui.getDate() - 5); // Il y a x jours
            dateAprès.setDate(aujourdhui.getDate() + 7); // 7 jours dans le futur
            partiesFiltrées = toutesPartiesData.filter(p =>
                p.date >= dateAvant.toISOString().split('T')[0] &&
                p.date <= dateAprès.toISOString().split('T')[0]
            );

            remplirSélecteur(partiesFiltrées);
        }

        function remplirSélecteur(liste) {
            const select = document.getElementById('listeParties');
            select.innerHTML = '<option value="">-- Choisir une partie --</option>';
            liste.forEach(p => {
                const éA = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeA);
                const éB = toutesÉquipes.find(e => e.noÉquipe === p.noÉquipeB);
                const option = document.createElement('option');
                option.value = p.noPartie;
                option.textContent =
                    `#${p.noPartie} — ${p.date} — ${éA.nomÉquipe} vs ${éB.nomÉquipe}`;
                select.appendChild(option);
            });
        }

        // ============================================================
        // Annuler la réponse d'une question — retire les points
        // ============================================================
        function annulerRéponse() {
            if (!confirm('Annuler la réponse et retirer les points ?')) return;
            socket.emit('annulerRéponse', partieActuelle);
        }

        function toggleToutesParties() {
            const afficherTout = document.getElementById('toutesParties').checked;
            remplirSélecteur(afficherTout ? toutesPartiesData : partiesFiltrées);
        }

        chargerDonnées();

        function terminerPartie() {
            if (confirm('Voulez-vous terminer la partie et sauvegarder les résultats ?')) {
                socket.emit('terminerPartie', partieActuelle);
            }
        }

        // Télécharger le fichier répondants de la partie en cours
        function téléchargerPartie() {
            if (!partieActuelle) {
                alert('Aucune partie sélectionnée !');
                return;
            }
            window.open(`/api/telecharger/repondants-partie/${partieActuelle}`, '_blank');
        }

        // Télécharger le fichier cumulatif de toute la saison
        function téléchargerRépondants() {
            window.open('/api/telecharger/repondants', '_blank');
        }
        socket.on('partieTerminée', ({ noPartie, scores }) => {
            console.log(`Partie ${noPartie} terminée !`, scores);
        });

    </script>
</body>
