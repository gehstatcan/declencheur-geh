<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>🛠️ Administration — GEH Statcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --fond: #0f0f1a;
            --fond-carte: #1a1a2e;
            --fond-champ: #16213e;
            --accent: #e94560;
            --buzz: #FFD700;
            --buzz-texte: #000000;
            --vert: #2ecc71;
            --orange: #e67e22;
            --blanc: #ffffff;
            --gris: #aaaaaa;
            --rayon: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fond);
            color: var(--blanc);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            color: var(--blanc);
            letter-spacing: 2px;
            line-height: 1;
        }

        header h1 span {
            color: var(--accent);
        }

        h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6em;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .carte {
            background: var(--fond-carte);
            border-radius: var(--rayon);
            padding: 24px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .zone-upload {
            border: 2px dashed var(--accent);
            border-radius: var(--rayon);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 16px;
        }

        .zone-upload:hover {
            border-color: var(--buzz);
            background: var(--fond-champ);
        }

        .zone-upload input[type="file"] {
            display: none;
        }

        .zone-upload label {
            cursor: pointer;
            font-size: 1em;
            color: var(--gris);
        }

        .zone-upload .icone {
            font-size: 3em;
            margin-bottom: 12px;
        }

        #nomFichier {
            color: var(--buzz);
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95em;
        }

        .bouton {
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            padding: 14px 24px;
            margin: 5px;
            color: var(--blanc);
            border: none;
            border-radius: var(--rayon);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .bouton:active {
            transform: scale(0.97);
        }

        .bouton-upload {
            background: var(--accent);
            font-size: 1.1em;
        }

        .bouton-upload:hover {
            background: #c0392b;
        }

        .bouton-upload:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #résultat {
            display: none;
            margin-top: 16px;
            border-radius: var(--rayon);
            font-size: 1em;
            overflow: hidden;
        }

        #résultat.erreur {
            padding: 16px;
            background: var(--accent);
            color: var(--blanc);
            text-align: center;
        }

        .résultat-titre {
            padding: 12px 16px;
            background: var(--fond-champ);
            font-weight: 600;
            font-size: 1.05em;
        }

        .résultat-ligne {
            padding: 10px 16px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .résultat-ligne.succès {
            background: #1a3a2a;
            color: #2ecc71;
        }

        .résultat-ligne.avertissement {
            background: #3a2a10;
            color: var(--orange);
        }

        .table-résultat {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .table-résultat th {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            text-align: left;
            color: var(--gris);
            font-weight: 600;
        }

        .table-résultat td {
            padding: 7px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .info {
            font-size: 0.9em;
            color: var(--gris);
            margin-top: 12px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <header>
        <img src="ampouleQuiz.png" alt="Logo GEH" style="width:52px; height:52px; filter:invert(1);">
        <h1>GEH — <span>Statcan</span></h1>
    </header>

    <h2>🛠️ Administration</h2>

    <!-- Upload questionnaire -->
    <div class="carte">
        <h2>📥 Importer un questionnaire</h2>

        <div class="zone-upload" onclick="document.getElementById('fichierExcel').click()">
            <div class="icone">📊</div>
            <label>Cliquez pour choisir un fichier Excel</label>
            <input type="file" id="fichierExcel" accept=".xlsx,.xls" onchange="fichierChoisi(this)">
            <div id="nomFichier"></div>
        </div>

        <button class="bouton bouton-upload" id="btnUpload" onclick="uploadQuestionnaire()" disabled>
            📥 Importer le questionnaire
        </button>

        <div id="résultat"></div>

        <div class="info">
            ℹ️ Le fichier doit contenir une feuille <strong>Vers BD</strong>
            avec les tables <strong>tblThèmes</strong> et
            <strong>tblQuestionnaires</strong>.<br>
            Le numéro de questionnaire doit correspondre à celui dans
            <strong>parties.json</strong>.
        </div>
    </div>

    <script>
        let fichierSélectionné = null;

        function fichierChoisi(input) {
            if (input.files && input.files[0]) {
                fichierSélectionné = input.files[0];
                document.getElementById('nomFichier').textContent =
                    `📄 ${fichierSélectionné.name}`;
                document.getElementById('btnUpload').disabled = false;
                document.getElementById('résultat').style.display = 'none';
            }
        }

        async function uploadQuestionnaire() {
            if (!fichierSélectionné) return;

            const btn = document.getElementById('btnUpload');
            btn.disabled = true;
            btn.textContent = '⏳ Importation en cours...';

            const formData = new FormData();
            formData.append('fichier', fichierSélectionné);

            try {
                const réponse = await fetch('/api/upload/questionnaire', {
                    method: 'POST',
                    body: formData
                });

                const résultat = await réponse.json();
                const div = document.getElementById('résultat');
                div.style.display = 'block';

                if (résultat.succès) {
                    div.className = '';

                    // Thèmes
                    let htmlThèmes;
                    const sousThèmeMsg = résultat.nbAvecSousThème > 0 ? ` — ${résultat.nbAvecSousThème} série(s) avec sous-thème` : '';
                    if (résultat.thèmesSansValeur.length === 0) {
                        htmlThèmes = `<div class="résultat-ligne succès">✅ ${résultat.nbSéries} thèmes importés avec succès${sousThèmeMsg}</div>`;
                    } else {
                        htmlThèmes = `<div class="résultat-ligne avertissement">⚠️ ${résultat.nbSéries - résultat.thèmesSansValeur.length}/${résultat.nbSéries} thèmes valides — séries sans thème : S${résultat.thèmesSansValeur.join(', S')}${sousThèmeMsg}</div>`;
                    }

                    // Questions
                    let htmlQuestions;
                    if (résultat.sériesIncomplètes.length === 0) {
                        htmlQuestions = `<div class="résultat-ligne succès">✅ Toutes les questions importées avec succès (${résultat.nbQuestions}/${résultat.nbQuestions})</div>`;
                    } else {
                        const nbComplètes = résultat.nbSéries - résultat.sériesIncomplètes.length;
                        const lignes = résultat.sériesIncomplètes.map(s =>
                            `<tr><td>Série ${s.noSérie}</td><td style="text-align:center">${s.textesVides}/${s.total}</td><td style="text-align:center">${s.réponsesVides}/${s.total}</td></tr>`
                        ).join('');
                        htmlQuestions = `
                            <div class="résultat-ligne avertissement">⚠️ Certaines questions ou réponses semblent manquantes. ${nbComplètes} série(s) sont complètes. Problèmes avec les séries suivantes :</div>
                            <table class="table-résultat">
                                <thead><tr><th>Série</th><th style="text-align:center">Textes vides</th><th style="text-align:center">Réponses vides</th></tr></thead>
                                <tbody>${lignes}</tbody>
                            </table>`;
                    }

                    div.innerHTML = `
                        <div class="résultat-titre">📥 Questionnaire #${résultat.noQuestionnaire} importé</div>
                        ${htmlThèmes}
                        ${htmlQuestions}
                    `;
                } else {
                    div.className = 'erreur';
                    div.textContent = `❌ Erreur : ${résultat.erreur}`;
                }
            } catch (e) {
                const div = document.getElementById('résultat');
                div.style.display = 'block';
                div.className = 'erreur';
                div.textContent = `❌ Erreur de connexion : ${e.message}`;
            }

            btn.disabled = false;
            btn.textContent = '📥 Importer le questionnaire';
        }
    </script>

</body>

</html>
