<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Accès animateur — GEH Statcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --fond: #f5f0e8;
            --fond-carte: #ede8dc;
            --fond-champ: #e0d9cc;
            --accent: #2c3e50;
            --blanc: #ffffff;
            --texte: #2c2c2c;
            --gris: #888888;
            --rouge: #c0392b;
            --rayon: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fond);
            color: var(--texte);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            color: var(--texte);
            letter-spacing: 2px;
        }

        header h1 span { color: var(--accent); }

        .carte {
            background: var(--fond-carte);
            border-radius: var(--rayon);
            padding: 32px;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .carte h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4em;
            color: var(--accent);
            letter-spacing: 1px;
            text-align: center;
        }

        label {
            font-size: 0.88em;
            font-weight: 600;
            color: var(--gris);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--fond-champ);
            background: var(--blanc);
            font-family: inherit;
            font-size: 1em;
            color: var(--texte);
            outline: none;
            transition: border 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--blanc);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #1a252f; }

        .erreur {
            display: none;
            background: #fdecea;
            border: 1px solid #f5c6c2;
            color: var(--rouge);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88em;
            text-align: center;
        }

        .erreur.visible { display: block; }
    </style>
</head>

<body>

    <header>
        <img src="ampouleQuiz.png" alt="Logo GEH" style="width:52px; height:52px; mix-blend-mode:multiply;">
        <h1>GEH — <span>Statcan</span></h1>
    </header>

    <div class="carte">
        <h2>Espace animateur</h2>
        <div>
            <label for="motDePasse">Mot de passe</label>
            <input type="password" id="motDePasse" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="erreur" id="erreur">Mot de passe incorrect</div>
        <button onclick="connexion()">Entrer</button>
    </div>

    <script>
        const input = document.getElementById('motDePasse');
        input.addEventListener('keydown', e => { if (e.key === 'Enter') connexion(); });
        input.focus();

        async function connexion() {
            const motDePasse = input.value;
            const erreur = document.getElementById('erreur');
            erreur.classList.remove('visible');

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ motDePasse })
            });

            if (res.ok) {
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('redirect') || '/admin.html';
            } else {
                erreur.classList.add('visible');
                input.value = '';
                input.focus();
            }
        }
    </script>

</body>

</html>
